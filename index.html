  };
  window.validateBackup = function(data){
    const required = ['clientes','pagos','clases','horarios','planes','personal','configuracion'];
    const missing = required.filter(k=>!(k in (data||{})));
    if(missing.length) return 'Faltan claves: '+missing.join(', ');
    const arrays = ['clientes','pagos','clases','horarios','planes','personal'];
    const invalid = arrays.filter(k=>!Array.isArray(data[k]));
    if(invalid.length) return 'Estas claves deben ser listas: '+invalid.join(', ');
    return true;
  };
  window.importFullBackup = function(file){
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(){
      try{
        const data = JSON.parse(reader.result);
        const validation = validateBackup(data);
        if(validation !== true){toast && toast(validation);return;}
        if(!confirm('Este backup puede sobrescribir datos actuales. ¿Continuar?')) return;
        db.clients = data.clientes;
        db.payments = data.pagos;
        db.classes = data.clases;
        db.schedules = data.horarios;
        db.plans = data.planes;
        db.users = data.personal;
        db.settings = {...(db.settings||{}),...(data.configuracion||{})};
        logAudit('Importar backup','backup','Se importo backup JSON');
        saveDB(); render(); toast && toast('Backup importado correctamente.');
      }catch(err){toast && toast('El archivo no es un JSON valido.');}
    };
    reader.readAsText(file);
  };
  window.createManualBackup = function(){exportFullBackup();};
  function backupPanel(){
    return '<section class="card p-5 backup-panel"><h3 class="panel-title">Datos y respaldo</h3><p class="mt-1 text-sm font-bold text-[#66706A]">Herramientas administrativas para exportar, importar y auditar cambios.</p><div class="backup-actions">'+
      '<button class="btn btn-secondary" onclick="exportToCSV(\'clients\')">Exportar clientes a CSV</button>'+
      '<button class="btn btn-secondary" onclick="exportToCSV(\'payments\')">Exportar pagos a CSV</button>'+
      '<button class="btn btn-secondary" onclick="exportToCSV(\'classes\')">Exportar clases a CSV</button>'+
      '<button class="btn btn-primary" onclick="exportFullBackup()">Exportar todo a JSON</button>'+
      '<label class="btn btn-secondary">Importar backup JSON<input type="file" accept="application/json" hidden onchange="importFullBackup(this.files[0])"></label>'+
      '<button class="btn btn-secondary" onclick="createManualBackup()">Crear backup manual</button>'+
      '</div><h3 class="panel-title mt-5">Historial de cambios</h3>'+renderAuditLog()+'</section>';
  }
  const baseRenderConfig = typeof renderConfig === 'function' ? renderConfig : null;
  if(baseRenderConfig){
    renderConfig = function(){
      return baseRenderConfig.apply(this,arguments) + backupPanel();
    };
  }
  const baseSaveEntity = typeof saveEntity === 'function' ? saveEntity : null;
  if(baseSaveEntity){
    saveEntity = function(entityType,data,id){
      const result = baseSaveEntity.apply(this,arguments);
      logAudit(id?'Editar':'Crear',entityType,(id?'Se edito ':'Se creo ')+entityType);
      return result;
    };
  }
  const baseUpdateEntity = typeof updateEntity === 'function' ? updateEntity : null;
  if(baseUpdateEntity){
    updateEntity = function(entityType,id,data){
      const result = baseUpdateEntity.apply(this,arguments);
      logAudit('Editar',entityType,'Se actualizo '+entityType+' '+id);
      return result;
    };
  }
  const baseDeleteEntity = typeof deleteEntity === 'function' ? deleteEntity : null;
  if(baseDeleteEntity){
    deleteEntity = function(entityType,id){

      logAudit('Eliminar',entityType,'Se elimino '+entityType+' '+id);
      return result;

  const baseViewClient = typeof viewClient === 'function' ? viewClient : null;

    viewClient = function(id){
      const c = getClient(id);
      if(!c) return baseViewClient.apply(this,arguments);
      const pays = arr('payments').filter(p=>p.clienteId===id);
      const cls = arr('classes').filter(cl=>(cl.clientesIds||[]).includes(id));
      const paymentRows = pays.length ? pays.map(function(p){
        return '<div class="rounded-2xl border border-[#DED6C8] bg-[#F7F4EF] p-3"><div class="flex flex-wrap items-center justify-between gap-2"><b>'+h(p.mesAbonado||paymentMonth(p))+' · '+h(safeMoney(p.monto))+'</b>'+statusBadge(p.estado)+'</div><div class="mt-2">'+reminderButton(p)+'</div></div>';
      }).join('') : '<div class="empty-state">Sin pagos</div>';
      showModal('Ficha de cliente',clientFullName(c),'<div class="grid gap-4 md:grid-cols-2"><div class="card p-4"><b>Datos</b><p>DNI: '+h(c.dni||'-')+'</p><p>Telefono: '+h(c.telefono||'-')+'</p><p>Direccion: '+h(c.direccion||'-')+'</p><p>Plan: '+h(getPlan(c.planId)?.nombre||'-')+'</p><p>Estado: '+h(c.estado||'-')+'</p></div><div class="card p-4"><b>Pago</b><p>Estado: '+paymentSummary(id)+'</p><p>Ultimo pago: '+h(pays[0]?.fechaPago||'-')+'</p><p>Proximo vencimiento: dia 10 del mes siguiente</p><p>Deuda: '+(pays.some(p=>['Pendiente','Vencido','Parcial'].includes(p.estado))?'Tiene deuda':'Sin deuda registrada')+'</p></div><div class="card p-4 md:col-span-2"><b>Horarios</b><p>'+h(cls.map(cl=>(cl.dia||'')+' '+(cl.hora||'')+' · '+userName(cl.personalId)).join('\n')||'Sin horarios asignados').replace(/\n/g,'<br>')+'</p></div><div class="card p-4 md:col-span-2"><b>Historial de pagos</b><div class="mt-3 grid gap-2">'+paymentRows+'</div></div></div>');
    };

  const baseRender = typeof render === 'function' ? render : null;

})();

<script>
function getSelectedPaymentClient() {
  const clientId =
    filters?.payClient ||
    filters?.clienteId ||
    filters?.cliente ||
    filters?.clientId ||
    filters?.payCliente ||
    document.querySelector('[name="clienteId"]')?.value ||
    document.querySelector('[name="cliente"]')?.value ||
    document.querySelector('[name="payClient"]')?.value ||
    "";

  if (!clientId) return null;

  return db.clients.find(c =>
    String(c.id) === String(clientId) ||
    String(c.importId) === String(clientId) ||
    `${c.nombre || ""} ${c.apellido || ""}`.trim() === String(clientId)
  ) || null;
}

function getClientPhone(cliente) {
  return cliente?.telefono || cliente?.phone || cliente?.celular || cliente?.whatsapp || "";
}

function normalizeArgentinaPhone(phone) {
  let n = String(phone || "").replace(/\D/g, "");

  if (!n) return "";

  if (n.startsWith("00")) n = n.slice(2);

  if (!n.startsWith("54")) {
    n = "54" + n;
  }

  return n;
}

function getPaymentReminderConcept(pago) {
  const plan = typeof getPlan === "function" ? getPlan(pago?.planId) : null;
  return pago?.concepto || pago?.planNombre || plan?.nombre || pago?.mesAbonado || pago?.mes || "tu plan";
}

function paymentMatchesSelectedMonth(pago) {
  const selectedMonth = filters?.payMonth || filters?.mes || filters?.month || "";
  if (!selectedMonth) return true;
  const values = [
    pago?.mesAbonado,
    pago?.mes,
    pago?.fechaPago,
    pago?.createdAt
  ].filter(Boolean).map(String);
  return values.some(value => {
    if (value.includes(selectedMonth)) return true;
    const date = new Date(value);
    return !Number.isNaN(date.getTime()) && date.toISOString().slice(0, 7) === selectedMonth;
  });
}

function getClientPendingPayments(cliente) {
  if (!cliente) return [];

  const selectedStatus = filters?.payEstado || filters?.estado || "";

  return db.payments.filter(p => {
    const sameClient =
      String(p.clienteId) === String(cliente.id) ||
      String(p.clientId) === String(cliente.id) ||
      String(p.clienteId) === String(cliente.importId) ||
      String(p.clientId) === String(cliente.importId);

    const pending = p.estado === "Pendiente" || p.estado === "Vencido";
    const statusMatches =
      !selectedStatus ||
      !["Pendiente", "Vencido"].includes(selectedStatus) ||
      p.estado === selectedStatus;

    return sameClient && pending && statusMatches && paymentMatchesSelectedMonth(p);
  });
}

function buildWhatsAppPendingPaymentsMessage(cliente, pagos) {
  const nombre = `${cliente.nombre || ""} ${cliente.apellido || ""}`.trim() || "cliente";

  if (pagos.length === 1) {
    const p = pagos[0];
    const concepto = getPaymentReminderConcept(p);
    const monto = Number(p.monto || 0).toLocaleString("es-AR");

    if (p.estado === "Vencido") {
      return `Hola ${nombre}, te escribimos de Nihuen Pilates para avisarte que figura un pago vencido correspondiente a ${concepto} por un monto de ${monto}. Te pedimos regularizarlo para mantener activa tu reserva/clase. Gracias.`;
    }

    return `Hola ${nombre}, te escribimos de Nihuen Pilates para recordarte que tenés un pago pendiente correspondiente a ${concepto} por un monto de ${monto}. Podés regularizarlo cuando puedas. Gracias.`;
  }

  const total = pagos.reduce((acc, p) => acc + Number(p.monto || 0), 0);
  const detalle = pagos.map(p => {
    const concepto = getPaymentReminderConcept(p);
    const monto = Number(p.monto || 0).toLocaleString("es-AR");
    return `- ${concepto}: ${monto} (${p.estado})`;
  }).join("\n");

  return `Hola ${nombre}, te escribimos de Nihuen Pilates para recordarte que registramos los siguientes pagos pendientes:\n\n${detalle}\n\nTotal: ${total.toLocaleString("es-AR")}\n\nGracias.`;
}

function avisarSeleccionadosPorWhatsApp() {
  const cliente = getSelectedPaymentClient();

  if (!cliente) {
    alert("Seleccioná una clienta para enviar el aviso por WhatsApp.");
    return;
  }

  const rawPhone = getClientPhone(cliente);
  const phone = normalizeArgentinaPhone(rawPhone);

  if (!rawPhone) {
    alert("La clienta seleccionada no tiene teléfono cargado.");
    return;
  }

  if (phone.length < 12) {
    alert("El teléfono cargado no parece válido.");
    return;
  }

  const pagos = getClientPendingPayments(cliente);

  if (!pagos.length) {
    alert("La clienta seleccionada no tiene pagos pendientes para avisar.");
    return;
  }

  const message = buildWhatsAppPendingPaymentsMessage(cliente, pagos);
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

  if (typeof logAudit === "function") {
    logAudit("Aviso WhatsApp", "payments", "Se generó aviso agrupado para " + ((cliente.nombre || "") + " " + (cliente.apellido || "")).trim());
  }

  window.open(url, "_blank", "noopener,noreferrer");
}

window.getSelectedPaymentClient = getSelectedPaymentClient;
window.getClientPhone = getClientPhone;
window.normalizeArgentinaPhone = normalizeArgentinaPhone;
window.getClientPendingPayments = getClientPendingPayments;
window.buildWhatsAppPendingPaymentsMessage = buildWhatsAppPendingPaymentsMessage;
window.avisarSeleccionadosPorWhatsApp = avisarSeleccionadosPorWhatsApp;
window.openSelectedWhatsAppReminders = avisarSeleccionadosPorWhatsApp;
</script>

<script>
(function(){
  function byId(id){return document.getElementById(id)}
  function esc(v){
    if(typeof h === 'function') return h(v);
    return String(v == null ? '' : v).replace(/[&<>]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]});
  }
  function moneySafe(v){return typeof money === 'function' ? money(v) : ('$ '+Number(v||0).toLocaleString('es-AR'))}
  function getArr(name){return Array.isArray(db && db[name]) ? db[name] : []}
  function findClient(id){return typeof getClient === 'function' ? getClient(id) : getArr('clients').find(function(c){return c.id===id})}
  function findPlan(id){return typeof getPlan === 'function' ? getPlan(id) : getArr('plans').find(function(p){return p.id===id})}
  function phoneOfClient(c){
    if(!c) return '';
    if(typeof getClientPhone === 'function') return getClientPhone(c) || '';
    return c.telefono || c.celular || c.whatsapp || c.phone || '';
  }
  function cleanPhone(raw){
    if(typeof normalizeArgentinaPhone === 'function') return normalizeArgentinaPhone(raw || '');
    var digits = String(raw || '').replace(/\D/g,'');
    if(!digits) return '';
    if(digits.indexOf('54') !== 0) digits = '54' + digits;
    return digits;
  }
  function paymentConcept(p){return (p && (p.mesAbonado || p.fechaPago)) || 'el período registrado'}
  function manualPaymentMessage(cliente,pago){
    var nombre = ((cliente && (cliente.nombre || '')) + ' ' + (cliente && (cliente.apellido || ''))).trim() || 'cliente';
    var monto = Number(pago && pago.monto || 0).toLocaleString('es-AR');
    var concepto = paymentConcept(pago);
    if(pago && pago.estado === 'Vencido'){
      return 'Hola '+nombre+', te escribimos de Nihuen Pilates para avisarte que figura un pago vencido correspondiente a '+concepto+' por un monto de $ '+monto+'. Te pedimos regularizarlo para mantener activa tu reserva/clase. Gracias.';
    }
    return 'Hola '+nombre+', te escribimos de Nihuen Pilates para recordarte que tenés un pago pendiente correspondiente a '+concepto+' por un monto de $ '+monto+'. Podés regularizarlo cuando puedas. Gracias.';
  }
  window.openPaymentWhatsAppReminder = function(paymentId){
    var p = getArr('payments').find(function(x){return x.id === paymentId});
    if(!p) return;
    var c = findClient(p.clienteId);
    var raw = phoneOfClient(c);
    var phone = cleanPhone(raw);
    if(!raw || phone.length < 10){
      if(typeof toast === 'function') toast('El cliente no tiene teléfono válido');
      else alert('El cliente no tiene teléfono válido');
      return;
    }
    var message = typeof buildWhatsAppPendingPaymentsMessage === 'function' ? buildWhatsAppPendingPaymentsMessage(c,[p]) : manualPaymentMessage(c,p);
    window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(message),'_blank','noopener,noreferrer');
  };
  function paymentReminderCell(p){
    var c = findClient(p.clienteId);
    if(p.estado === 'Pagado') return '-';
    if(p.estado !== 'Pendiente' && p.estado !== 'Vencido') return '-';
    if(!phoneOfClient(c)) return 'Sin teléfono';
    return '<button type="button" class="btn btn-primary wa-row-btn" onclick="openPaymentWhatsAppReminder(\''+String(p.id).replace(/'/g,'\\\'')+'\')">WhatsApp</button>';
  }
  function paymentCard(p){
    return '<div class="card p-4">'+
      '<div class="flex justify-between gap-3"><div><b>'+esc(typeof clientName === 'function' ? clientName(p.clienteId) : '')+'</b><div class="text-sm font-semibold text-[#7d7466]">'+esc((findPlan(p.planId)||{}).nombre || '-')+' · '+esc(moneySafe(p.monto))+' · '+esc(p.mesAbonado || '-')+'</div></div>'+statusBadge(p.estado || '-')+'</div>'+
      '<div class="mt-2 text-sm"><b>Medio:</b> '+esc(p.medioPago || '-')+'</div>'+
      '<div class="mt-3 payment-action-stack">'+paymentReminderCell(p)+paymentActions(p)+'</div>'+
    '</div>';
  }
  window.renderPagos = function(){
    if(typeof canViewPayments === 'function' && !canViewPayments()) return denied();
    var list = getArr('payments').slice().sort(function(a,b){
      return String(b.createdAt || b.fechaPago || '').localeCompare(String(a.createdAt || a.fechaPago || ''));
    });
    var top = '<div class="payments-manual-top">'+(typeof isGeneral === 'function' && isGeneral() ? '<button onclick="newPayment()" class="btn btn-primary">Nuevo</button>' : '')+'</div>';
    return top + responsiveList(
      ['Aviso','Cliente','Plan','Monto','Mes','Medio','Estado','Acciones'],
      list.map(function(p){
        return [paymentReminderCell(p),esc(typeof clientName === 'function' ? clientName(p.clienteId) : ''),esc((findPlan(p.planId)||{}).nombre || '-'),esc(moneySafe(p.monto)),esc(p.mesAbonado || '-'),esc(p.medioPago || '-'),statusBadge(p.estado || '-'),paymentActions(p)];
      }),
      list.map(paymentCard)
    );
  };
  window.__floatingActionItems = [];
  function menuItems(entityType,item){
    var id = item && item.id;
    var items = [];
    if(!id) return items;
    if(entityType === 'clients'){
      items.push(['Ver perfil',"viewClient('"+id+"')"]);
      if(typeof isGeneral !== 'function' || isGeneral()) items.push(['Registrar pago',"newPaymentForClient('"+id+"')"]);
      if(typeof canEdit !== 'function' || canEdit('clients',item)) items.push(['Editar',"editClient('"+id+"')"],['Dar de baja',"lowClient('"+id+"')"],['Eliminar',"deleteClient('"+id+"')",true]);
    }
    if(entityType === 'users'){
      items.push(['Ver detalle',"viewUser('"+id+"')"]);
      if(typeof canEdit !== 'function' || canEdit('users',item)) items.push(['Editar',"editUser('"+id+"')"],['Dar de baja',"lowUser('"+id+"')"]);
      if(typeof canDelete === 'function' && canDelete('users',item)) items.push(['Eliminar',"deleteUser('"+id+"')",true]);
    }
    if(entityType === 'plans'){
      items.push(['Editar',"editPlan('"+id+"')"],[item.estado === 'Activo' ? 'Desactivar' : 'Activar',"togglePlan('"+id+"')"]);
      if(typeof canDelete === 'function' && canDelete('plans',item)) items.push(['Eliminar',"deletePlan('"+id+"')",true]);
    }
    if(entityType === 'classes'){
      items.push(['Ver alumnos',"viewClass('"+id+"')"]);
      if(typeof canEdit !== 'function' || canEdit('classes',item)) items.push(['Editar',"editClass('"+id+"')"],['Cancelar',"cancelClass('"+id+"')"]);
      if(typeof canDelete === 'function' && canDelete('classes',item)) items.push(['Eliminar',"deleteClass('"+id+"')",true]);
    }
    if(entityType === 'schedules'){
      if(typeof canEdit !== 'function' || canEdit('schedules',item)) items.push(['Editar',"editSchedule('"+id+"')"],['Mover cliente',"moveSchedule('"+id+"')"],['Quitar cliente',"removeSchedule('"+id+"')",true]);
      if(typeof canDelete === 'function' && canDelete('schedules',item)) items.push(['Eliminar',"deleteSchedule('"+id+"')",true]);
    }
    if(entityType === 'payments'){
      items.push(['Ver detalle',"viewPayment('"+id+"')"]);
      if(item.estado === 'Pendiente' || item.estado === 'Vencido') items.push(['Avisar por WhatsApp',"openPaymentWhatsAppReminder('"+id+"')"]);
      if(typeof canEdit !== 'function' || canEdit('payments',item)) items.push(['Editar',"editPayment('"+id+"')"]);
      if(typeof canDelete !== 'function' || canDelete('payments',item)) items.push(['Eliminar',"deletePayment('"+id+"')",true]);
    }
    return items;
  }
  function ensureFloatingMenu(){
    var menu = byId('floatingActionMenu');
    if(!menu){
      menu = document.createElement('div');
      menu.id = 'floatingActionMenu';
      document.body.appendChild(menu);
    }
    return menu;
  }
  window.openFloatingActionMenu = function(button, actions){
    var menu = ensureFloatingMenu();
    window.__floatingActionItems = actions || [];
    menu.innerHTML = window.__floatingActionItems.map(function(action,index){
      return '<button type="button" class="'+(action.danger?'danger':'')+'" data-floating-action="'+index+'">'+esc(action.label)+'</button>';
    }).join('');
    menu.classList.add('show');
    menu.style.visibility = 'hidden';
    menu.style.top = '0px';
    menu.style.left = '0px';
    var rect = button.getBoundingClientRect();
    var menuRect = menu.getBoundingClientRect();
    var gap = 8;
    var margin = 12;
    var top = rect.bottom + gap;
    var left = rect.right - menuRect.width;
    if(top + menuRect.height > window.innerHeight - margin) top = rect.top - menuRect.height - gap;
    if(left + menuRect.width > window.innerWidth - margin) left = window.innerWidth - menuRect.width - margin;
    if(left < margin) left = margin;
    if(top < margin) top = margin;
    menu.style.top = top + 'px';
    menu.style.left = left + 'px';
    menu.style.visibility = 'visible';
  };
  window.closeFloatingActionMenu = function(){
    var menu = byId('floatingActionMenu');
    if(menu){
      menu.classList.remove('show');
      menu.innerHTML = '';
    }
    window.__floatingActionItems = [];
  };
  window.openGlobalActionsMenu = function(event,button,entityType,itemId){
    if(event) event.stopPropagation();
    var item = null;
    var map = {clients:'clients',users:'users',plans:'plans',classes:'classes',schedules:'schedules',payments:'payments'};
    var arrName = map[entityType];
    if(arrName) item = getArr(arrName).find(function(x){return x.id === itemId});
    var actions = menuItems(entityType,item).map(function(x){return {label:x[0],handler:x[1],danger:!!x[2]};});
    if(!actions.length) return;
    openFloatingActionMenu(button,actions);
  };
  window.renderActionsMenu = function(entityType,item){
    if(!item || !item.id) return '-';
    var id = String(item.id).replace(/'/g,"\\'");
    var type = String(entityType).replace(/'/g,"\\'");
    return '<div class="action-cell"><button type="button" class="action-trigger" title="Acciones" aria-label="Acciones" onclick="openGlobalActionsMenu(event,this,\''+type+'\',\''+id+'\')"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="5" cy="12" r="1.35"></circle><circle cx="12" cy="12" r="1.35"></circle><circle cx="19" cy="12" r="1.35"></circle></svg></button></div>';
  };
  window.clientActions = function(c){return renderActionsMenu('clients',c)};
  window.personalActions = function(u){return renderActionsMenu('users',u)};
  window.planActions = function(p){return renderActionsMenu('plans',p)};
  window.classActions = function(cl){return renderActionsMenu('classes',cl)};
  window.scheduleActions = function(s){return renderActionsMenu('schedules',s)};
  window.paymentActions = function(p){return renderActionsMenu('payments',p)};
  window.newPaymentForClient = function(clientId){
    if(typeof newPayment === 'function') newPayment();
    setTimeout(function(){
      var select = document.querySelector('#modal select[name="clienteId"]');
      if(select){
        select.value = clientId;
        select.dispatchEvent(new Event('change',{bubbles:true}));
      }
    },0);
  };
  document.addEventListener('click',function(event){
    var menu = byId('floatingActionMenu');
    if(menu && menu.contains(event.target)){
      var btn = event.target.closest('[data-floating-action]');
      if(btn){
        var action = window.__floatingActionItems[Number(btn.getAttribute('data-floating-action'))];
        closeFloatingActionMenu();
        if(action && action.handler){
          try{ (new Function(action.handler))(); }catch(err){ console.error(err); }
        }
      }
      return;
    }
    if(!event.target.closest('.action-trigger')) closeFloatingActionMenu();
  },true);
  document.addEventListener('keydown',function(event){if(event.key === 'Escape') closeFloatingActionMenu();});
  window.addEventListener('scroll',closeFloatingActionMenu,true);
  window.addEventListener('resize',closeFloatingActionMenu);
  var originalGo = window.go;
  if(typeof originalGo === 'function'){
    window.go = function(section){closeFloatingActionMenu();return originalGo(section);};
  }
})();
</script>

<script>
(function(){
  const WEEK_DAYS = ['Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  const PAYMENT_STATES = ['Pagado','Pendiente','Debe'];
  const REPORT_STATES = ['pendiente_verificacion','aprobado','rechazado'];
  const oldNormalizeDB = typeof normalizeDB === 'function' ? normalizeDB : null;
  const oldSaveDB = typeof saveDB === 'function' ? saveDB : null;
  const oldConfirmExcelImport = typeof confirmExcelImport === 'function' ? confirmExcelImport : null;
  const oldMergeImportedData = typeof mergeImportedData === 'function' ? mergeImportedData : null;

  function esc(v){
    if(typeof escapeHtml === 'function') return escapeHtml(v);
    return String(v == null ? '' : v).replace(/[&<>]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]});
  }
  function attr(v){
    if(typeof escapeAttr === 'function') return escapeAttr(v);
    return esc(v).replace(/"/g,'&quot;');
  }
  function ntext(value){
    return String(value || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();
  }
  window.normalizeText = ntext;
  function fullName(c){return String(((c && c.nombre) || '') + ' ' + ((c && c.apellido) || '')).replace(/\s+/g,' ').trim() || 'Sin nombre'}
  function compareByName(a,b){return ntext(fullName(a)).localeCompare(ntext(fullName(b)),'es')}
  function getArr(name){return Array.isArray(db && db[name]) ? db[name] : []}
  function dayLabel(value){
    const key = ntext(value);
    if(key.startsWith('lun')) return 'Lunes';
    if(key.startsWith('mar')) return 'Martes';
    if(key.startsWith('mie')) return 'Miercoles';
    if(key.startsWith('jue')) return 'Jueves';
    if(key.startsWith('vie')) return 'Viernes';
    if(key.startsWith('sab')) return 'Sabado';
    return '';
  }
  function dayKey(value){return ntext(dayLabel(value) || value)}
  function timeLabel(value){
    const raw = String(value || '').trim();
    const m = raw.match(/(\d{1,2})(?::?(\d{2}))?/);
    if(!m) return '';
    return String(Number(m[1])).padStart(2,'0') + ':' + String(m[2] || '00').padStart(2,'0');
  }
  function clientPlan(c){return typeof getPlan === 'function' ? getPlan(c && c.planId) : getArr('plans').find(p=>p.id === (c && c.planId))}
  function teacherName(id){return typeof userName === 'function' ? userName(id) : fullName(getArr('users').find(u=>u.id===id))}
  function status(s){return typeof statusBadge === 'function' ? statusBadge(s || '-') : '<span class="badge">'+esc(s || '-')+'</span>'}
  function cash(n){return typeof money === 'function' ? money(n) : '$ ' + Number(n || 0).toLocaleString('es-AR')}
  function today(){return typeof todayISO === 'function' ? todayISO() : new Date().toISOString().slice(0,10)}
  function month(){return typeof monthKey === 'function' ? monthKey() : new Date().toISOString().slice(0,7)}
  function newId(){return typeof uid === 'function' ? uid() : 'id_' + Math.random().toString(36).slice(2) + Date.now().toString(36)}
  function stamp(){return typeof now === 'function' ? now() : new Date().toISOString()}
  function selected(a,b){return String(a || '') === String(b || '') ? 'selected' : ''}

  function readClassAssignments(data, clientId){
    const out = [];
    (data.classes || []).forEach(function(cl){
      if((cl.clientesIds || []).includes(clientId)){
        out.push({
          day: dayLabel(cl.dia) || cl.dia,
          time: timeLabel(cl.hora),
          teacherId: cl.personalId || '',
          teacherName: teacherName(cl.personalId)
        });
      }
    });
    (data.schedules || []).forEach(function(s){
      if(s.clienteId === clientId && !out.some(x=>dayKey(x.day)===dayKey(s.dia) && x.time===timeLabel(s.horario))){
        out.push({
          day: dayLabel(s.dia) || s.dia,
          time: timeLabel(s.horario),
          teacherId: s.personalId || '',
          teacherName: teacherName(s.personalId)
        });
      }
    });
    return out.filter(x=>x.day && x.time);
  }
  function cleanScheduleDaysForClient(c,data){
    let list = Array.isArray(c.scheduleDays) ? c.scheduleDays : [];
    if(!list.length) list = readClassAssignments(data || db || {}, c.id);
    const seen = new Set();
    return list.map(function(item){
      const teacherId = item.teacherId || item.personalId || '';
      return {
        day: dayLabel(item.day || item.dia) || item.day || item.dia || '',
        time: timeLabel(item.time || item.horario || item.hora),
        teacherId: teacherId,
        teacherName: item.teacherName || teacherName(teacherId)
      };
    }).filter(function(item){
      const key = dayKey(item.day) + '|' + item.time + '|' + item.teacherId;
      if(!item.day || !item.time || seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }
  function ensureStudioData(data){
    data = data || {};
    ['users','clients','plans','classes','schedules','payments','attendance','paymentReports'].forEach(function(k){
      if(!Array.isArray(data[k])) data[k] = [];
    });
    if(!data.settings) data.settings = {};
    data.clients.forEach(function(c){
      c.scheduleDays = cleanScheduleDaysForClient(c,data);
      c.paymentStatus = c.paymentStatus || quickPaymentStatus(c,data);
    });
    data.clients.sort(compareByName);
    syncClassesAndSchedules(data);
    return data;
  }
  window.normalizeDB = function(data){
    const normalized = oldNormalizeDB ? oldNormalizeDB(data) : data;
    return ensureStudioData(normalized);
  };
  ensureStudioData(db);

  function quickPaymentStatus(c,data){
    if(c && c.paymentStatus) return c.paymentStatus;
    const pays = ((data || db).payments || []).filter(p=>p.clienteId === (c && c.id)).sort((a,b)=>String(b.createdAt || b.fechaPago || '').localeCompare(String(a.createdAt || a.fechaPago || '')));
    if(!pays.length) return 'Pendiente';
    if(pays[0].estado === 'Pagado') return 'Pagado';
    if(pays[0].estado === 'Vencido') return 'Debe';
    return 'Pendiente';
  }
  function syncClassesAndSchedules(data){
    const groups = new Map();
    (data.clients || []).forEach(function(c){
      cleanScheduleDaysForClient(c,data).forEach(function(s){
        const d = dayLabel(s.day);
        const t = timeLabel(s.time);
        if(!d || !t) return;
        const teacherId = s.teacherId || '';
        const key = dayKey(d) + '|' + t + '|' + teacherId;
        if(!groups.has(key)) groups.set(key,{day:d,time:t,teacherId:teacherId,clients:[]});
        groups.get(key).clients.push(c.id);
      });
    });
    const existing = new Map((data.classes || []).map(function(cl){return [dayKey(cl.dia)+'|'+timeLabel(cl.hora)+'|'+(cl.personalId || ''),cl]}));
    const classes = [];
    groups.forEach(function(g,key){
      const old = existing.get(key) || {};
      classes.push({
        id: old.id || ('class_' + key.replace(/[^a-z0-9]+/gi,'_')),
        dia: g.day,
        hora: g.time,
        personalId: g.teacherId,
        clientesIds: g.clients.slice().sort(function(a,b){return compareByName((data.clients||[]).find(c=>c.id===a)||{},(data.clients||[]).find(c=>c.id===b)||{})}),
        cupoMaximo: old.cupoMaximo || MAX_CUPO || 8,
        estado: old.estado || 'Activa',
        observaciones: old.observaciones || '',
        createdAt: old.createdAt || stamp(),
        updatedAt: stamp()
      });
    });
    if(classes.length) data.classes = classes.sort((a,b)=>dayIndex(a.dia)-dayIndex(b.dia) || String(a.hora).localeCompare(String(b.hora)));
    data.schedules = [];
    data.classes.forEach(function(cl){
      (cl.clientesIds || []).forEach(function(cid){
        data.schedules.push({
          id:'sch_' + cl.id + '_' + cid,
          clienteId:cid,
          personalId:cl.personalId || '',
          dia:cl.dia,
          horario:cl.hora,
          claseId:cl.id,
          estado:cl.estado === 'Activa' ? 'Activo' : 'Cancelado',
          createdAt:stamp(),
          updatedAt:stamp()
        });
      });
    });
  }
  function dayIndex(day){const idx = WEEK_DAYS.map(ntext).indexOf(ntext(day)); return idx < 0 ? 99 : idx}
  function clientScheduleText(c){
    return cleanScheduleDaysForClient(c,db).map(s=>s.day + ' ' + s.time + (s.teacherName ? ' - ' + s.teacherName : '')).join(', ');
  }
  function allTimes(){
    const set = new Set();
    getArr('clients').forEach(c=>cleanScheduleDaysForClient(c,db).forEach(s=>set.add(s.time)));
    if(!set.size) ['08:00','09:00','10:00','17:00','18:00','19:00','20:00'].forEach(t=>set.add(t));
    return Array.from(set).sort();
  }
  function currentDayName(){return dayLabel(new Date().toLocaleDateString('es-AR',{weekday:'long'}))}
  function slotDateTime(date,time){
    const d = new Date(date + 'T00:00:00');
    const parts = String(time || '00:00').split(':').map(Number);
    d.setHours(parts[0] || 0,parts[1] || 0,0,0);
    return d;
  }
  function isSlotInProgress(slot,date){
    if(!slot || !date || date !== today()) return false;
    if(dayKey(slot.day) !== dayKey(currentDayName())) return false;
    const start = slotDateTime(date,slot.time);
    const minutes = typeof getClassDurationMinutes === 'function' ? getClassDurationMinutes() : 60;
    const end = new Date(start.getTime() + minutes * 60000);
    const current = new Date();
    return current >= start && current < end;
  }

  window.saveDB = function(){
    ensureStudioData(db);
    if(typeof saveLocal === 'function') saveLocal();
    if(firebaseOnline && firestore && !applyingRemote){
      return firestore.doc(FIRESTORE_DOC_PATH).set({
        payload: JSON.parse(JSON.stringify(db)),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      },{merge:false}).then(function(){
        const el = document.getElementById('syncStatus');
        if(el) el.textContent = 'Firebase conectado: guardado sincronizado';
        return true;
      }).catch(function(err){
        console.error('Firestore save error',err);
        if(typeof toast === 'function') toast('No se pudo guardar en Firebase. El cambio quedo solo como respaldo local.');
        throw err;
      });
    }
    if(typeof oldSaveDB === 'function' && !firebaseOnline) return oldSaveDB();
    return Promise.resolve(true);
  };
  async function persist(message){
    try{
      await window.saveDB();
      if(message && typeof toast === 'function') toast(message);
      return true;
    }catch(err){
      return false;
    }
  }

  const hiddenSections = new Set(['horarios']);
  window.allowedSections = function(){
    const base = Array.isArray(sections) ? sections : [];
    return (typeof isGeneral === 'function' && isGeneral() ? base : base.filter(s=>!['personal','planes','reportes','config','importar'].includes(s[0]) && (s[0] !== 'pagos' || canViewPayments()))).filter(s=>!hiddenSections.has(s[0]));
  };
  window.renderNav = function(){
    const nav = document.getElementById('nav');
    if(!nav) return;
    nav.innerHTML = allowedSections().map(function(s){
      return '<button class="tab '+(currentSection===s[0]?'active':'')+'" onclick="go(\''+s[0]+'\')" title="'+attr(s[1])+'"><span class="nav-icon">'+(s[3] || '')+'</span><span class="nav-label">'+esc(s[1])+'</span></button>';
    }).join('');
  };
  window.go = function(id){
    if(id === 'horarios') id = 'agenda';
    currentSection = id;
    filters = {};
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    if(sidebar) sidebar.classList.remove('open');
    if(overlay) overlay.classList.remove('show');
    render();
  };
  window.render = function(){
    if(!currentUser) return;
    ensureStudioData(db);
    if(currentSection === 'horarios') currentSection = 'agenda';
    const meta = (Array.isArray(sections) ? sections.find(s=>s[0]===currentSection) : null) || ['dashboard','Dashboard',''];
    const title = document.getElementById('pageTitle');
    const subtitle = document.getElementById('pageSubtitle');
    if(title) title.textContent = currentSection === 'dashboard' ? 'Nihuen Pilates' : meta[1];
    if(subtitle) subtitle.textContent = meta[2] || '';
    const userEl = document.getElementById('userName');
    const todayEl = document.getElementById('todayText');
    if(userEl && currentUser) userEl.textContent = fullName(currentUser);
    if(todayEl) todayEl.textContent = isGeneral() ? 'Administrador' : 'Profesora';
    const roleText = document.getElementById('roleText');
    if(roleText) roleText.textContent = isGeneral() ? 'Administrador general' : 'Profesora';
    renderNav();
    const map = {dashboard:renderDashboard,clientes:renderClientes,personal:renderPersonal,planes:renderPlanes,clases:renderClases,pagos:renderPagos,agenda:renderAgenda,importar:renderImportar,reportes:renderReportes,config:renderConfig,perfil:renderPerfil};
    const content = document.getElementById('content');
    if(content) content.innerHTML = (map[currentSection] || renderDashboard)();
    setupGlobalSearch();
  };

  window.visibleClients = function(){
    const list = isGeneral() ? getArr('clients') : getArr('clients').filter(function(c){
      return cleanScheduleDaysForClient(c,db).some(s=>!s.teacherId || s.teacherId === currentUser.id);
    });
    return list.slice().sort(compareByName);

  window.saveClient = async function(e,id){
    e.preventDefault();
    if(!isGeneral()) return toast('Permiso denegado');
    const form = e.target;
    const fd = Object.fromEntries(new FormData(form).entries());
    const dup = getArr('clients').find(c=>fd.dni && c.dni === fd.dni && c.id !== id);
    if(dup) return toast('Ya existe un cliente con ese DNI');
    const dayInputs = Array.from(form.querySelectorAll('[name="scheduleDay"]'));
    const timeInputs = Array.from(form.querySelectorAll('[name="scheduleTime"]'));
    const teacherInputs = Array.from(form.querySelectorAll('[name="scheduleTeacherId"]'));
    const scheduleDays = dayInputs.map(function(input,i){
      const teacherId = teacherInputs[i] ? teacherInputs[i].value : '';
      return {day:dayLabel(input.value),time:timeLabel(timeInputs[i] ? timeInputs[i].value : ''),teacherId:teacherId,teacherName:teacherName(teacherId)};
    }).filter(s=>s.day && s.time);
    delete fd.scheduleDay; delete fd.scheduleTime; delete fd.scheduleTeacherId;
    let item = id ? getArr('clients').find(c=>c.id===id) : null;
    if(item) Object.assign(item,fd,{scheduleDays:scheduleDays,updatedAt:stamp()});
    else getArr('clients').push(Object.assign({id:newId(),createdAt:stamp()},fd,{scheduleDays:scheduleDays,updatedAt:stamp()}));
    syncClassesAndSchedules(db);
    if(await persist('Cliente guardado')){closeModal();render();}

  function weeklySlots(){
    const map = new Map();
    visibleClients().forEach(function(c){
      cleanScheduleDaysForClient(c,db).forEach(function(s){
        if(!isGeneral() && s.teacherId && s.teacherId !== currentUser.id) return;
        const key = dayKey(s.day)+'|'+s.time;
        if(!map.has(key)) map.set(key,{day:dayLabel(s.day),time:s.time,teacherId:s.teacherId || '',teacherIds:[],teacherNames:[],clients:[],clientTeacher:{},clientTeacherName:{}});
        const slot = map.get(key);
        const tid = s.teacherId || '';
        const tname = s.teacherName || teacherName(tid);
        if(tid && !slot.teacherIds.includes(tid)) slot.teacherIds.push(tid);
        if(tname && tname !== 'Sin personal' && !slot.teacherNames.includes(tname)) slot.teacherNames.push(tname);
        if(!slot.clients.some(existing=>existing.id===c.id)) slot.clients.push(c);
        slot.clientTeacher[c.id] = tid;
        slot.clientTeacherName[c.id] = tname;
      });
    });
    return Array.from(map.values()).map(function(slot){
      slot.clients.sort(compareByName);
      slot.teacherId = slot.teacherIds[0] || slot.teacherId || '';
      slot.teacherName = slot.teacherNames.join(', ') || teacherName(slot.teacherId) || 'Sin profesora';
      return slot;
    }).sort((a,b)=>dayIndex(a.day)-dayIndex(b.day) || String(a.time).localeCompare(String(b.time)));
  }
  function buildAgendaGrid(q,teacher){
    const times = allTimes();
    const selectedDate = filters.agendaDate || today();
    const slots = weeklySlots().filter(s=>!teacher || s.teacherIds.includes(teacher)).filter(function(s){
      return searchMatch([s.day,s.time,s.teacherNames.join(' '),s.clients.map(fullName).join(' ')].join(' '),q);
    });
    const byCell = new Map();
    slots.forEach(s=>byCell.set(dayKey(s.day)+'|'+s.time,s));
    return renderMobileAgenda(slots,selectedDate) + '<div class="nih-week-grid agenda-desktop-grid"><table class="nih-week-table"><thead><tr><th>Horario</th>'+WEEK_DAYS.map(d=>'<th>'+esc(d)+'</th>').join('')+'</tr></thead><tbody>'+times.map(function(t){
      return '<tr><td class="nih-week-time">'+esc(t)+'</td>'+WEEK_DAYS.map(function(d){
        const slot = byCell.get(dayKey(d)+'|'+t);
        if(!slot) return '<td></td>';
        return '<td>'+renderWeeklySlotBlock(slot,selectedDate)+'</td>';

    }).join('')+'</tbody></table></div>';

  function agendaDateText(dateValue){

  }
  function agendaSelectedDay(selectedDate,slots){
    const forced = filters.agendaMobileDay || '';
    if(WEEK_DAYS.some(d=>dayKey(d)===dayKey(forced))) return dayLabel(forced);
    const realDay = dayLabel(new Date((selectedDate || today()) + 'T12:00:00').toLocaleDateString('es-AR',{weekday:'long'}));
    if(WEEK_DAYS.some(d=>dayKey(d)===dayKey(realDay))) return realDay;

  function renderMobileAgenda(slots,selectedDate){

    const tabs = WEEK_DAYS.map(function(d){

  function renderWeeklySlotBlock(slot,selectedDate){

  window.openWeeklyClassDetail = function(day,time){

    const slot = weeklySlots().find(s=>dayKey(s.day)===day && s.time===time);

      const att = getAttendance(selectedDate,slot.day,time,c.id);
      const teacherId = slot.clientTeacher[c.id] || slot.teacherId || '';

  function xmlEscape(v){return String(v == null ? '' : v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function colName(n){let s='';while(n>=0){s=String.fromCharCode(n%26+65)+s;n=Math.floor(n/26)-1;}return s}
  function sheetXml(rows){
    return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>'+rows.map(function(row,r){
      return '<row r="'+(r+1)+'">'+row.map(function(cell,c){
        const ref = colName(c)+(r+1), num = typeof cell === 'number' && Number.isFinite(cell);
        return '<c r="'+ref+'" t="'+(num?'n':'inlineStr')+'">'+(num?'<v>'+cell+'</v>':'<is><t>'+xmlEscape(cell)+'</t></is>')+'</c>';
      }).join('')+'</row>';
    }).join('')+'</sheetData></worksheet>';
  }
  function crc32(str){
    const table = crc32.table || (crc32.table = Array.from({length:256},(_,n)=>{let c=n;for(let k=0;k<8;k++)c=((c&1)?(0xedb88320^(c>>>1)):(c>>>1));return c>>>0;}));
    let crc = -1;
    for(let i=0;i<str.length;i++) crc = (crc>>>8) ^ table[(crc ^ str.charCodeAt(i)) & 255];
    return (crc ^ -1) >>> 0;
  }
  function u16(n){return String.fromCharCode(n&255,(n>>>8)&255)}
  function u32(n){return String.fromCharCode(n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255)}

    let local='', central='', offset=0;

      const name=f.name, data=utf8bin(f.data), crc=crc32(data), size=data.length;
      const header='PK\003\004'+u16(20)+u16(0)+u16(0)+u16(0)+u16(0)+u32(crc)+u32(size)+u32(size)+u16(name.length)+u16(0)+name;

      central += 'PK\001\002'+u16(20)+u16(20)+u16(0)+u16(0)+u16(0)+u16(0)+u32(crc)+u32(size)+u32(size)+u16(name.length)+u16(0)+u16(0)+u16(0)+u16(0)+u32(0)+u32(offset)+name;
      offset += header.length + data.length;
    });

      {name:'xl/workbook.xml',data:'<?xml version="1.0" encoding="UTF-8"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>'+names.map((n,i)=>'<sheet name="'+xmlEscape(n).slice(0,31)+'" sheetId="'+(i+1)+'" r:id="rId'+(i+1)+'"/>').join('')+'</sheets></workbook>'},

<script>
(function(){
  function byId(id){return document.getElementById(id)}
  function isMobileSidebarMode(){return window.matchMedia ? window.matchMedia('(max-width: 768px)').matches : window.innerWidth <= 768}
  function ensureMobileSidebarClose(){
    const sidebar = byId('sidebar');
    if(!sidebar || byId('mobileSidebarClose')) return;
    const btn = document.createElement('button');
    btn.id = 'mobileSidebarClose';
    btn.type = 'button';
    btn.className = 'mobile-sidebar-close';
    btn.setAttribute('aria-label','Cerrar menu');
    btn.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"></path></svg>';
    btn.addEventListener('click',function(event){event.preventDefault(); closeSidebar();});
    sidebar.insertBefore(btn,sidebar.firstChild);
  }
  window.openSidebar = function(){
    const sidebar = byId('sidebar');
    const overlay = byId('overlay');
    ensureMobileSidebarClose();
    if(sidebar) sidebar.classList.add('open');
    if(overlay){
      overlay.classList.remove('hidden');
      overlay.classList.add('show');
    }
    document.body.classList.add('sidebar-open');
  };
  window.closeSidebar = function(){
    const sidebar = byId('sidebar');
    const overlay = byId('overlay');
    if(sidebar) sidebar.classList.remove('open');
    if(overlay){
      overlay.classList.remove('show');
      overlay.classList.add('hidden');
    }
    document.body.classList.remove('sidebar-open');
  };
  window.toggleSidebar = function(){
    const sidebar = byId('sidebar');
    if(sidebar && sidebar.classList.contains('open')) closeSidebar();
    else openSidebar();
  };

  function wireSidebar(){
    ensureMobileSidebarClose();
    const menuBtn = byId('menuBtn');
    const overlay = byId('overlay');
    const nav = byId('nav');
    const logout = byId('logoutBtn');
    if(menuBtn && !menuBtn.dataset.sidebarFixed){
      menuBtn.dataset.sidebarFixed = '1';
      menuBtn.onclick = function(event){event.preventDefault(); toggleSidebar();};
    }
    if(overlay && !overlay.dataset.sidebarFixed){
      overlay.dataset.sidebarFixed = '1';
      overlay.onclick = function(event){event.preventDefault(); closeSidebar();};
    }
    if(nav && !nav.dataset.sidebarFixed){
      nav.dataset.sidebarFixed = '1';
      nav.addEventListener('click',function(event){
        const tab = event.target.closest('.tab');
        if(tab && isMobileSidebarMode()) setTimeout(closeSidebar,0);
      });
    }
    if(logout && !logout.dataset.sidebarFixed){
      logout.dataset.sidebarFixed = '1';
      logout.addEventListener('click',function(){closeSidebar();});
    }
  }

  const previousGoMobileFix = typeof window.go === 'function' ? window.go : null;
  window.go = function(id){
    const result = previousGoMobileFix ? previousGoMobileFix(id) : undefined;
    if(isMobileSidebarMode()) closeSidebar();
    return result;
  };

  document.addEventListener('keydown',function(event){
    if(event.key === 'Escape') closeSidebar();
  });
  window.addEventListener('resize',function(){
    if(!isMobileSidebarMode()) closeSidebar();
  });
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded',wireSidebar);
  else wireSidebar();
})();
</script>

<script>
(function(){
  function normalizeTextLocal(value){
    return String(value || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();
  }
  function normalizeDayLocal(value){
    const key = normalizeTextLocal(value);
    if(key.startsWith('lun')) return 'lunes';
    if(key.startsWith('mar')) return 'martes';
    if(key.startsWith('mie')) return 'miercoles';
    if(key.startsWith('jue')) return 'jueves';
    if(key.startsWith('vie')) return 'viernes';
    if(key.startsWith('sab')) return 'sabado';
    if(key.startsWith('dom')) return 'domingo';
    return key;
  }
  function normalizeTimeLocal(value){
    const raw = String(value || '').trim();
    const m = raw.match(/(\d{1,2})(?::?(\d{2}))?/);
    if(!m) return '';
    return String(Number(m[1])).padStart(2,'0') + ':' + String(m[2] || '00').padStart(2,'0');
  }
  function currentStamp(){
    if(typeof stamp === 'function') return stamp();
    if(typeof now === 'function') return now();
    return new Date().toISOString();
  }
  window.deleteClass = function(id){
    const classes = Array.isArray(db && db.classes) ? db.classes : [];
    const cl = classes.find(c=>c.id===id);
    if(!cl) return typeof toast === 'function' && toast('Clase no encontrada');
    if(typeof canDelete === 'function' && !canDelete('classes',cl)) return toast('Solo administrador general');
    const targetDay = normalizeDayLocal(cl.dia);
    const targetTime = normalizeTimeLocal(cl.hora);
    const targetTeacher = cl.personalId || '';
    const sameSlot = function(item){
      const itemDay = normalizeDayLocal(item.dia || item.day);
      const itemTime = normalizeTimeLocal(item.hora || item.horario || item.time);
      const itemTeacher = item.personalId || item.teacherId || item.scheduleTeacherId || '';
      return itemDay === targetDay && itemTime === targetTime && (!targetTeacher || !itemTeacher || itemTeacher === targetTeacher);
    };
    const classIds = classes.filter(sameSlot).map(c=>c.id);
    const label = (cl.dia || 'ese dia') + ' ' + (cl.hora || '');
    confirmDelete('Vas a eliminar el horario fijo de '+label+'. Esto lo quitara de todas las semanas y fechas de ese dia para las alumnas asignadas.',function(){
      let removedAssignments = 0;
      (Array.isArray(db.clients) ? db.clients : []).forEach(function(client){
        const list = Array.isArray(client.scheduleDays) ? client.scheduleDays : [];
        const before = list.length;
        client.scheduleDays = list.filter(function(s){return !sameSlot(s);});
        if(client.scheduleDays.length !== before){
          removedAssignments += before - client.scheduleDays.length;
          client.updatedAt = currentStamp();
        }
      });
      if(Array.isArray(db.schedules)){
        db.schedules = db.schedules.filter(function(s){return !(sameSlot(s) || classIds.includes(s.claseId));});
      }
      db.classes = classes.filter(function(c){return !sameSlot(c);});
      if(typeof saveDB === 'function') saveDB();
      if(typeof render === 'function') render();
      if(typeof toast === 'function') toast('Horario eliminado para todas las fechas de ese dia'+(removedAssignments ? ' ('+removedAssignments+' asignaciones)' : ''));
    });
  };
})();
</script>

<script>
/* ===== NIH PERSISTENCE HARDENING PATCH: single source of truth, weekly agenda, payments, class detail ===== */
(function(){

    if(k.startsWith('mar')) return 'martes';
    if(k.startsWith('mie')) return 'miercoles';
    if(k.startsWith('jue')) return 'jueves';
    if(k.startsWith('vie')) return 'viernes';
    if(k.startsWith('sab')) return 'sabado';

    const users = Array.isArray(data.users) ? data.users : [];

      (data.schedules || []).forEach(s=>{ if(tatiIds.includes(s.personalId)) s.personalId = memaId; if(tatiIds.includes(s.teacherId)) s.teacherId = memaId; });

    });
    data.schedules = (data.schedules || []).filter(function(s){ return !s.clienteId || validNewIds.has(s.clienteId); });
    data.payments = cloneLocal(relationSource.payments || data.payments || []);
    (data.payments || []).forEach(function(p){
      if(p.clienteId) p.clienteId = mapId(p.clienteId);
    });
    data.payments = (data.payments || []).filter(function(p){ return !p.clienteId || validNewIds.has(p.clienteId); });
    data.attendance = cloneLocal(relationSource.attendance || data.attendance || []);
    (data.attendance || []).forEach(function(a){
      if(a.clientId) a.clientId = mapId(a.clientId);
      if(a.clienteId) a.clienteId = mapId(a.clienteId);
    });
    data.attendance = (data.attendance || []).filter(function(a){ return (!a.clientId || validNewIds.has(a.clientId)) && (!a.clienteId || validNewIds.has(a.clienteId)); });
    data.paymentReports = cloneLocal(relationSource.paymentReports || data.paymentReports || []);
    (data.paymentReports || []).forEach(function(r){
      if(r.clientId) r.clientId = mapId(r.clientId);
      if(r.clienteId) r.clienteId = mapId(r.clienteId);
    });
    data.paymentReports = (data.paymentReports || []).filter(function(r){ return (!r.clientId || validNewIds.has(r.clientId)) && (!r.clienteId || validNewIds.has(r.clienteId)); });
    newClients.forEach(function(c){
      const old = (oldClients || []).find(function(x){ return nkey((x.apellido || '') + ' ' + (x.nombre || '')) === nkey((c.apellido || '') + ' ' + (c.nombre || '')); });
      if(old){
        c.dni = c.dni || old.dni || '';
        c.telefono = c.telefono || old.telefono || '';
        c.direccion = c.direccion || old.direccion || '';
        c.planId = c.planId || old.planId || '';
        c.paymentStatus = c.paymentStatus || old.paymentStatus || 'Pendiente';
        c.scheduleDays = Array.isArray(old.scheduleDays) ? old.scheduleDays : (c.scheduleDays || []);
        c.fechaAlta = old.fechaAlta || c.fechaAlta;
      }
    });
    (data.classes || []).forEach(function(cl){
      (cl.clientesIds || []).forEach(function(cid){
        const client = newClients.find(function(c){ return c.id === cid; });
        if(!client) return;
        const row = {day:cl.dia,time:cl.hora,teacherId:cl.personalId || '',teacherName:''};
        client.scheduleDays = Array.isArray(client.scheduleDays) ? client.scheduleDays : [];
        const rowKey = nkey(row.day + '|' + row.time + '|' + row.teacherId);
        if(!client.scheduleDays.some(function(s){ return nkey((s.day || s.dia || '') + '|' + (s.time || s.horario || s.hora || '') + '|' + (s.teacherId || s.personalId || '')) === rowKey; })){
          client.scheduleDays.push(row);
        }
      });
    });
  }
  function applyClientesSeed(force){
    if(typeof db === 'undefined') return false;
    db.settings = db.settings || {};
    const alreadyApplied = db.settings.clientesExcelSeedVersion === CLIENTES_EXCEL_SEED_VERSION;
    if(force || !alreadyApplied){
      try{
        localStorage.setItem('nihuenPilatesDB_before_CLIENTES_migration_' + CLIENTES_EXCEL_SEED_VERSION, JSON.stringify(db));
      }catch(err){}
      const relationSource = bestRelationSource(db);
      const nextClients = clientSeedList();
      remapRelatedData(db, relationSource, nextClients);
      applyPilates31Assignments(db, nextClients);
      rebuildClassesFromClientSchedules(db, nextClients);
      importRelatedRowsFromPilates31(db, nextClients);
      db.clients = nextClients;
    }else{
      db.clients = dedupeClients(db.clients);
    }
    markCurrentSeed(db);
    if(typeof syncClassesAndSchedules === 'function') syncClassesAndSchedules(db);
    else if(typeof syncSchedules === 'function') syncSchedules();
    if(typeof normalizeDB === 'function') db = normalizeDB(db);
    if(typeof saveLocal === 'function') saveLocal();
    else localStorage.setItem('nihuenPilatesDB', JSON.stringify(db));
    return true;
  }
  async function applyClientesSeedAndPersist(force){
    const changed = applyClientesSeed(force);
    if(changed && typeof saveDB === 'function') await saveDB();
    if(changed && typeof render === 'function') render();
    return changed;
  }

  window.CLIENTES_EXCEL_SOURCE = CLIENTES_EXCEL_SOURCE;
  window.applyClientesExcelSeed = async function(){ await applyClientesSeedAndPersist(true); if(typeof toast === 'function') toast('Base CLIENTES restaurada desde clientes.xlsx'); };

  const previousSaveDB = typeof saveDB === 'function' ? saveDB : null;
  window.saveDB = saveDB = async function(){
    if(typeof db !== 'undefined'){
      db.clients = dedupeClients(db.clients || []);
      markCurrentSeed(db);
    }
    return previousSaveDB ? previousSaveDB.apply(this, arguments) : true;
  };

  const previousResetDemo = typeof resetDemo === 'function' ? resetDemo : null;
  window.resetDemo = resetDemo = function(){
    if(previousResetDemo) previousResetDemo();
    applyClientesSeed(true);
    if(typeof render === 'function') render();
    if(typeof toast === 'function') toast('Datos reiniciados con la base CLIENTES actual');
  };

  function downloadClientesXlsxFromCurrent(){
    const data = typeof normalizeDB === 'function' ? normalizeDB(JSON.parse(JSON.stringify(db))) : JSON.parse(JSON.stringify(db));
    const rows = [['Nro','CLIENTES']].concat(dedupeClients(data.clients || []).map(function(c,idx){
      return [idx + 1, titleName((c.apellido || '') + ' ' + (c.nombre || ''))];
    }));
    if(typeof downloadXlsx === 'function') downloadXlsx('clientes.xlsx', {CLIENTES:rows});
    else if(typeof toast === 'function') toast('Exportacion XLSX no disponible en este navegador');
  }
  window.downloadClientesXlsxFromCurrent = downloadClientesXlsxFromCurrent;
  window.overwriteEmbeddedClientesExcel = async function(){
    const data = typeof normalizeDB === 'function' ? normalizeDB(JSON.parse(JSON.stringify(db))) : JSON.parse(JSON.stringify(db));
    data.clients = dedupeClients(data.clients || []);
    markCurrentSeed(data);
    db = data;
    await saveDB();
    downloadClientesXlsxFromCurrent();
    if(typeof toast === 'function') toast('Base actual guardada y clientes.xlsx generado');
  };

  window.renderClientes = renderClientes = function(){
    const q = typeof getModuleSearch === 'function' ? getModuleSearch('clientes') : '';
    const estado = filters.estado || '', plan = filters.plan || '', pay = filters.pay || '';
    const states = Array.isArray(window.PAYMENT_STATES) ? window.PAYMENT_STATES : ['Pendiente','Pagado','Vencido','Parcial'];
    const filterIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16M7 12h10M10 19h4"></path></svg>';
    const plusIcon = '<span class="btn-icon-circle" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg></span>';
    const importIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"></path><path d="M14 2v6h6M12 18v-6M9 15l3 3 3-3"></path></svg>';
    const extra = '<select class="input" aria-label="Filtrar clientes por estado" onchange="filters.estado=this.value;render()"><option value="">Todos</option><option '+selectedLocal(estado,'Activo')+'>Activo</option><option '+selectedLocal(estado,'Inactivo')+'>Inactivo</option></select>'+
      '<select class="input" aria-label="Filtrar clientes por plan" onchange="filters.plan=this.value;render()"><option value="">Todos</option>'+arrLocal('plans').map(function(p){return '<option value="'+attrLocal(p.id)+'" '+selectedLocal(plan,p.id)+'>'+escLocal(p.nombre)+'</option>';}).join('')+'</select>'+
      '<select class="input" aria-label="Filtrar clientes por pago" onchange="filters.pay=this.value;render()"><option value="">Todos</option>'+states.map(function(s){return '<option '+selectedLocal(pay,s)+'>'+escLocal(s)+'</option>';}).join('')+'</select>'+
      (typeof isGeneral === 'function' && isGeneral()?'<button onclick="newClient()" class="btn btn-primary">'+plusIcon+'<span>Nuevo</span></button><button onclick="overwriteEmbeddedClientesExcel()" class="btn btn-secondary">'+importIcon+'<span>Actualizar Excel</span></button>':'');
    const list = arrLocal('clients').map(normalizeClientRecord).filter(function(c){
      const hay = nkey([clientFullName(c),c.dni,c.telefono,c.estado,paymentLabel(c),planLabel(c),scheduleLabel(c),c.observaciones].join(' '));
      return (!q || hay.indexOf(nkey(q)) !== -1) && (!estado || c.estado === estado) && (!plan || c.planId === plan) && (!pay || paymentLabel(c) === pay);
    }).sort(function(a,b){ return clientFullName(a).localeCompare(clientFullName(b),'es'); });
    return '<section class="clients-module">'+localToolbar('clientes',extra,'Buscar por nombre')+
      localResponsiveList(['Número','Cliente','DNI','Plan','Días fijos','Estado','Pago','Acciones'],
        list.map(function(c,idx){return [String(idx + 1), '<strong>'+escLocal(clientFullName(c))+'</strong>', escLocal(c.dni || '-'), escLocal(planLabel(c)), escLocal(scheduleLabel(c)), badgeLocal(c.estado), paymentControl(c), clientButtons(c)];}),
        list.map(function(c,idx){return '<article class="client-app-card"><div class="client-app-head"><div class="client-app-avatar">'+(idx + 1)+'</div><div class="client-app-title"><b>'+escLocal(clientFullName(c))+'</b><span>DNI '+escLocal(c.dni || '-')+'</span></div>'+badgeLocal(c.estado)+'</div><div class="client-app-facts"><div class="client-fact"><small>Plan</small><strong>'+escLocal(planLabel(c))+'</strong></div><div class="client-fact"><small>Días fijos</small><strong>'+escLocal(scheduleLabel(c))+'</strong></div><div class="client-fact"><small>Estado</small><strong>'+escLocal(c.estado || '-')+'</strong></div><div class="client-fact"><small>Pago</small><strong>'+escLocal(paymentLabel(c))+'</strong></div></div><div class="client-app-bottom"><div class="client-pay-wrap">'+paymentControl(c)+'</div><div class="client-menu-wrap">'+clientButtons(c)+'</div></div></article>';})
      )+'</section>';
  };

  const previousSaveClient = typeof saveClient === 'function' ? saveClient : null;
  window.saveClient = saveClient = async function(e,id){
    if(!e || !e.target || !previousSaveClient) return previousSaveClient ? previousSaveClient.apply(this, arguments) : null;
    const form = e.target;
    const fd = Object.fromEntries(new FormData(form).entries());
    fd.apellido = titleName(fd.apellido || '');
    fd.nombre = titleName(fd.nombre || '');
    const duplicate = arrLocal('clients').find(function(c){
      return c.id !== id && nkey((c.apellido || '') + ' ' + (c.nombre || '')) === nkey(fd.apellido + ' ' + fd.nombre);
    });
    if(duplicate){
      e.preventDefault();
      if(typeof toast === 'function') toast('Ya existe un cliente con ese nombre: ' + titleName(fd.apellido + ' ' + fd.nombre));
      return;
    }
    form.querySelector('[name="apellido"]').value = fd.apellido;
    form.querySelector('[name="nombre"]').value = fd.nombre;
    return previousSaveClient.apply(this, arguments);
  };

  if(typeof PILATES_EXCEL_IMPORT_DATA === 'object' && PILATES_EXCEL_IMPORT_DATA){
    PILATES_EXCEL_IMPORT_DATA.sourceFile = 'clientes.xlsx';
    PILATES_EXCEL_IMPORT_DATA.generatedAt = stampLocal();
    PILATES_EXCEL_IMPORT_DATA.clientsFromSheet = clientSeedList().map(function(c){ return Object.assign({importId:c.id, fullName:titleName(c.apellido + ' ' + c.nombre), normalizedKey:nkey(c.apellido + ' ' + c.nombre), sources:['CLIENTES'], weeklyClasses:0, planName:'Sin plan'}, c); });
    PILATES_EXCEL_IMPORT_DATA.classesFromSheet = [];
    PILATES_EXCEL_IMPORT_DATA.schedulesFromSheet = [];
    PILATES_EXCEL_IMPORT_DATA.importWarnings = [];
  }

  window.renderImportar = renderImportar = function(){
    if(typeof isGeneral === 'function' && !isGeneral()) return denied();
    const total = arrLocal('clients').length;
    return localToolbar('importar','<button class="btn btn-primary" onclick="overwriteEmbeddedClientesExcel()">Actualizar clientes.xlsx</button><button class="btn btn-secondary" onclick="exportCurrentDatabaseXlsx && exportCurrentDatabaseXlsx()">Exportar base completa</button>','Buscar importacion')+
      '<section class="card p-5"><h3 class="nih-section-title">Base CLIENTES</h3><p class="nih-muted">La base inicial vieja fue reemplazada por la lista CLIENTES del Excel. Las altas y eliminaciones se guardan en la aplicacion; este boton genera clientes.xlsx con la base actual para sobrescribir el archivo incorporado.</p><div class="mt-4 grid gap-3 md:grid-cols-3"><div class="rounded-xl border border-[#DED6C8] p-3"><b>Clientes actuales</b><div class="text-2xl font-black">'+escLocal(total)+'</div></div><div class="rounded-xl border border-[#DED6C8] p-3"><b>Origen</b><div class="text-xl font-black">CLIENTES</div></div><div class="rounded-xl border border-[#DED6C8] p-3"><b>Duplicados</b><div class="text-2xl font-black">0</div></div></div><div class="nih-export-actions"><button class="btn btn-primary" onclick="overwriteEmbeddedClientesExcel()">Actualizar clientes.xlsx</button><button class="btn btn-secondary" onclick="applyClientesExcelSeed()">Restaurar base CLIENTES</button></div></section>';
  };

  window.renderReportes = renderReportes = function(){
    const clients = arrLocal('clients');
    const activeClients = clients.filter(function(c){ return c.estado !== 'Inactivo'; }).length;
    const inactiveClients = clients.filter(function(c){ return c.estado === 'Inactivo'; }).length;
    const payments = arrLocal('payments');
    const pendingPayments = payments.filter(function(p){ return p.estado === 'Pendiente'; }).length;
    const overduePayments = payments.filter(function(p){ return p.estado === 'Vencido'; }).length;
    const classes = arrLocal('classes');
    const fullClasses = classes.filter(function(cl){ return (cl.clientesIds || []).length >= Number(cl.cupoMaximo || 8); }).length;
    const freeSlots = classes.reduce(function(sum,cl){ return sum + Math.max(0, Number(cl.cupoMaximo || 8) - (cl.clientesIds || []).length); }, 0);
    function statCard(label,value,detail){ return '<div class="card p-5"><b>'+escLocal(label)+'</b><div class="text-4xl font-black mt-3">'+escLocal(value)+'</div><p class="nih-muted mt-2">'+escLocal(detail || '')+'</p></div>'; }
    return localToolbar('reportes','','Buscar dato o categoria del reporte')+
      '<div class="metric-grid dashboard-metrics">'+
      statCard('Clientes activos',activeClients,'Base CLIENTES actual')+
      statCard('Clientes inactivos',inactiveClients,'Dados de baja')+
      statCard('Pagos pendientes',pendingPayments,'Registros reales')+
      statCard('Pagos vencidos',overduePayments,'Registros reales')+
      statCard('Clases completas',fullClasses,'Cupo completo')+
      statCard('Cupos disponibles',freeSlots,'Sobre cupos configurados')+
      '</div>';
  };

  applyClientesSeedAndPersist(false);
  setTimeout(function(){ applyClientesSeedAndPersist(false); }, 600);
  setTimeout(function(){ applyClientesSeedAndPersist(false); }, 1800);
  if(typeof render === 'function' && window.currentUser) render();
})();
</script>
