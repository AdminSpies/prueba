  }
  menuAction = function menuAction(label,fn,danger=false){
    return `<button type="button" class="action-option ${danger?'danger':''}" onclick="event.stopPropagation();closeActionsMenu();${fn}">${label}</button>`;
  };
  renderActionsMenu = function renderActionsMenu(entityType,item){
    const id=item?.id;
    if(!id)return '-';
    let items=[];
    if(entityType==='clients'){
      items.push(['Ver detalle',`viewClient('${id}')`]);
      if(canEdit('clients',item))items.push(['Editar',`editClient('${id}')`],['Dar de baja',`lowClient('${id}')`],['Eliminar',`deleteClient('${id}')`,true]);
    }
    if(entityType==='users'){
      items.push(['Ver detalle',`viewUser('${id}')`]);
      if(canEdit('users',item))items.push(['Editar',`editUser('${id}')`],['Dar de baja',`lowUser('${id}')`]);
      if(canDelete('users',item))items.push(['Eliminar',`deleteUser('${id}')`,true]);
    }
    if(entityType==='plans'){
      items.push(['Editar',`editPlan('${id}')`],[item.estado==='Activo'?'Desactivar':'Activar',`togglePlan('${id}')`]);
      if(canDelete('plans',item))items.push(['Eliminar',`deletePlan('${id}')`,true]);
    }
    if(entityType==='classes'){
      items.push(['Ver alumnos',`viewClass('${id}')`]);
      if(canEdit('classes',item))items.push(['Editar',`editClass('${id}')`],['Cancelar',`cancelClass('${id}')`]);
      if(canDelete('classes',item))items.push(['Eliminar',`deleteClass('${id}')`,true]);
    }
    if(entityType==='schedules'){
      if(canEdit('schedules',item))items.push(['Editar',`editSchedule('${id}')`],['Mover cliente',`moveSchedule('${id}')`],['Quitar cliente',`removeSchedule('${id}')`,true]);
      if(canDelete('schedules',item))items.push(['Eliminar',`deleteSchedule('${id}')`,true]);
    }
    if(entityType==='payments'){
      items.push(['Ver detalle',`viewPayment('${id}')`]);
      if(canEdit('payments',item))items.push(['Editar',`editPayment('${id}')`]);
      if(canDelete('payments',item))items.push(['Eliminar',`deletePayment('${id}')`,true]);
    }
    if(!items.length)return '-';
    const open=openActionsMenu.type===entityType&&openActionsMenu.id===id;
    return `<div class="action-cell action-menu ${open?'open':''}" data-action-type="${actionAttr(entityType)}" data-action-id="${actionAttr(id)}" onclick="event.stopPropagation()"><button class="action-trigger" type="button" title="Acciones" aria-label="Abrir menú" aria-expanded="${open?'true':'false'}" onclick="event.stopPropagation();toggleActionsMenu('${entityType}','${id}')">⋮</button><div class="action-dropdown" role="menu">${items.map(([label,fn,danger])=>menuAction(label,fn,danger)).join('')}</div></div>`;
  };
  toggleActionsMenu = function toggleActionsMenu(entityType,itemId){
    const menu=Array.from(document.querySelectorAll('.action-cell.action-menu')).find(function(node){
      return node.getAttribute('data-action-type')===String(entityType) && node.getAttribute('data-action-id')===String(itemId);
    });
    const willOpen=!(menu&&menu.classList.contains('open'));
    closeFloatingActionMenus(menu);
    openActionsMenu=willOpen?{type:entityType,id:itemId}:{type:null,id:null};
    if(menu){
      menu.classList.toggle('open',willOpen);
      const trigger=menu.querySelector('.action-trigger');
      if(trigger) trigger.setAttribute('aria-expanded',willOpen?'true':'false');
    }
  };
  closeActionsMenu = function closeActionsMenu(){
    closeFloatingActionMenus(null);
    openActionsMenu={type:null,id:null};
    document.querySelectorAll('.action-cell.action-menu .action-trigger[aria-expanded="true"]').forEach(function(trigger){
      trigger.setAttribute('aria-expanded','false');
    });
  };
  document.addEventListener('click',function(event){
    const clickedMenu=event.target.closest('.action-cell.action-menu');
    if(!clickedMenu) closeActionsMenu();
  });
})();
</script>

<script>
(function(){
  if(window.__NIH_ENTERPRISE_UPGRADE_READY__) return;
  window.__NIH_ENTERPRISE_UPGRADE_READY__ = true;

  function h(value){
    return String(value ?? '').replace(/[&<>"]/g,function(ch){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch];
    });
  }
  function a(value){return h(value).replace(/'/g,'&#39;');}
  function arr(name){return Array.isArray(db && db[name]) ? db[name] : [];}
  function safeMoney(value){return typeof money === 'function' ? money(value) : formatCurrency(value);}
  function clientFullName(c){return [c?.nombre,c?.apellido].filter(Boolean).join(' ').trim() || 'Cliente';}
  function paymentNeedsReminder(p){return ['Pendiente','Vencido'].includes(String(p?.estado || ''));}
  function getPaymentClient(p){return typeof getClient === 'function' ? getClient(p?.clienteId) : arr('clients').find(c=>c.id===p?.clienteId);}

  window.debounce = window.debounce || function(fn,delay){
    let timer;
    return function(){
      const ctx=this,args=arguments;
      clearTimeout(timer);
      timer=setTimeout(function(){fn.apply(ctx,args);},delay);
    };
  };
  window.normalizeText = window.normalizeText || function(text){
    return String(text ?? '').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
  };
  window.formatCurrency = window.formatCurrency || function(value){
    return '$ ' + Number(value || 0).toLocaleString('es-AR');
  };
  window.formatDate = window.formatDate || function(value){
    if(!value) return '-';
    const date = value instanceof Date ? value : new Date(value);
    if(Number.isNaN(date.getTime())) return String(value);
    return new Intl.DateTimeFormat('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}).format(date);
  };

  let dashboardChartInstances = [];
  window.destroyDashboardCharts = function(){
    dashboardChartInstances.forEach(function(chart){
      try{chart.destroy();}catch(err){}
    });
    dashboardChartInstances = [];
  };
  function paymentMonth(p){
    const raw = p?.mesAbonado || p?.fechaPago || p?.createdAt || '';
    const m = String(raw).match(/\d{4}-\d{2}/);
    if(m) return m[0];
    const d = new Date(raw);
    if(Number.isNaN(d.getTime())) return 'Sin fecha';
    return d.toISOString().slice(0,7);
  }
  window.getMonthlyIncomeData = function(){
    const map = {};
    arr('payments').filter(p=>p.estado==='Pagado').forEach(function(p){
      const key = paymentMonth(p);
      map[key] = (map[key] || 0) + Number(p.monto || 0);
    });
    const labels = Object.keys(map).sort().slice(-12);
    return {labels:labels, values:labels.map(k=>map[k])};
  };
  window.getPaymentStatusData = function(){
    const labels = ['Pagado','Pendiente','Vencido'];
    return {labels:labels, values:labels.map(label=>arr('payments').filter(p=>p.estado===label).length)};
  };
  window.getOccupancyByScheduleData = function(){
    const map = {};
    arr('classes').filter(c=>c.estado!=='Cancelada').forEach(function(c){
      const key = String(c.dia || '-') + ' ' + String(c.hora || '');
      map[key] = (map[key] || 0) + ((c.clientesIds || []).length);
    });
    const rows = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,8);
    return {labels:rows.map(r=>r[0]), values:rows.map(r=>r[1])};
  };
  window.getClientStatusData = function(){
    const labels = ['Activos','Inactivos'];
    return {labels:labels, values:[arr('clients').filter(c=>c.estado==='Activo').length, arr('clients').filter(c=>c.estado==='Inactivo').length]};
  };
  function chartShell(){
    return '<section class="dashboard-analytics" aria-label="Analisis del estudio">'+
      chartCard('monthlyIncomeChart','Ingresos mensuales','Pagos cobrados agrupados por mes.')+
      chartCard('paymentStatusChart','Estado de pagos','Distribucion de pagos pagados, pendientes y vencidos.')+
      chartCard('occupancyScheduleChart','Ocupacion por horario','Horarios con mayor cantidad de alumnas.')+
      chartCard('clientStatusChart','Clientes activos vs inactivos','Estado general de la base de clientes.')+
      '</section>';
  }
  function chartCard(id,title,subtitle){
    return '<article class="analytics-card"><h3>'+h(title)+'</h3><p>'+h(subtitle)+'</p><div class="analytics-canvas-wrap"><canvas id="'+a(id)+'"></canvas></div></article>';
  }
  function showChartEmpty(id){
    const canvas = document.getElementById(id);
    if(!canvas) return;
    const wrap = canvas.parentElement;
    if(wrap) wrap.innerHTML = '<div class="chart-empty">Todavia no hay datos suficientes para mostrar este grafico</div>';
  }
  function hasChartData(data){return data && data.values && data.values.some(v=>Number(v)>0);}
  function createChart(id,type,data,options){
    const canvas = document.getElementById(id);
    if(!canvas) return;
    if(!hasChartData(data)){showChartEmpty(id);return;}
    const ctx = canvas.getContext('2d');
    dashboardChartInstances.push(new Chart(ctx,{type:type,data:data,options:options || {responsive:true,maintainAspectRatio:false}}));
  }
  window.renderDashboardCharts = function(){
    destroyDashboardCharts();
    if(typeof Chart === 'undefined'){
      ['monthlyIncomeChart','paymentStatusChart','occupancyScheduleChart','clientStatusChart'].forEach(showChartEmpty);
      return;
    }
    const common = {responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Inter',weight:'700'},color:'#10201a'}}},scales:{x:{ticks:{color:'#647067',font:{family:'Inter',weight:'700'}},grid:{color:'rgba(214,202,184,.35)'}},y:{ticks:{color:'#647067',font:{family:'Inter',weight:'700'}},grid:{color:'rgba(214,202,184,.35)'}}}};
    const monthly = getMonthlyIncomeData();
    createChart('monthlyIncomeChart','bar',{labels:monthly.labels,datasets:[{label:'Ingresos',data:monthly.values,backgroundColor:'#234332',borderRadius:10}]},common);
    const statuses = getPaymentStatusData();
    createChart('paymentStatusChart','doughnut',{labels:statuses.labels,datasets:[{data:statuses.values,backgroundColor:['#22c55e','#d8b56d','#c2413b'],borderColor:'#ffffff',borderWidth:4}]},{responsive:true,maintainAspectRatio:false,plugins:common.plugins});
    const occupancy = getOccupancyByScheduleData();
    createChart('occupancyScheduleChart','bar',{labels:occupancy.labels,datasets:[{label:'Alumnas',data:occupancy.values,backgroundColor:'#5f8f6b',borderRadius:10}]},{...common,indexAxis:'y'});
    const clients = getClientStatusData();
    createChart('clientStatusChart','doughnut',{labels:clients.labels,datasets:[{data:clients.values,backgroundColor:['#234332','#efe4d3'],borderColor:'#ffffff',borderWidth:4}]},{responsive:true,maintainAspectRatio:false,plugins:common.plugins});
  };

  const baseRenderDashboard = typeof renderDashboard === 'function' ? renderDashboard : null;
  if(baseRenderDashboard){
    renderDashboard = function(){
      return baseRenderDashboard.apply(this,arguments) + chartShell();
    };
  }

  function cleanPhone(raw){
    let digits = String(raw || '').replace(/\D/g,'');
    if(!digits) return '';
    digits = digits.replace(/^0+/,'');
    if(!digits.startsWith('54') && digits.length <= 11) digits = '54' + digits;
    return digits;
  }
  window.buildWhatsAppPaymentMessage = function(cliente,pago){
    const plan = (typeof getPlan === 'function' ? getPlan(pago?.planId) : null)?.nombre || pago?.concepto || 'tu plan';
    const amount = safeMoney(pago?.monto || 0);
    const name = clientFullName(cliente);
    if(String(pago?.estado) === 'Vencido'){
      return 'Hola '+name+', te escribimos de Nihuen Pilates para avisarte que figura un pago vencido correspondiente a '+plan+' por un monto de '+amount+'. Te pedimos regularizarlo para mantener activa tu reserva/clase. Gracias.';
    }
    return 'Hola '+name+', te escribimos de Nihuen Pilates para recordarte que tenes un pago pendiente correspondiente a '+plan+' por un monto de '+amount+'. Podes regularizarlo cuando puedas. Gracias.';
  };
  window.openWhatsAppPaymentReminder = function(cliente,pago){
    const phone = cleanPhone(cliente?.telefono);
    if(!phone){ if(typeof toast==='function') toast('El cliente no tiene telefono valido.'); return; }
    const url = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(buildWhatsAppPaymentMessage(cliente,pago));
    logAudit('Aviso WhatsApp','payments','Se genero aviso para '+clientFullName(cliente));
    window.open(url,'_blank','noopener');
  };
  window.openPaymentWhatsAppReminderById = function(paymentId){
    const pago = arr('payments').find(p=>p.id===paymentId);
    const cliente = getPaymentClient(pago);
    if(!pago || !cliente) return toast && toast('No se encontro el pago o cliente.');
    openWhatsAppPaymentReminder(cliente,pago);
  };
  function canSendPaymentReminder(p){
    const c = getPaymentClient(p);
    return paymentNeedsReminder(p) && !!cleanPhone(c?.telefono);
  }
  function reminderButton(p){
    if(!canSendPaymentReminder(p)) return '';
    return '<button type="button" class="wa-reminder-btn" onclick="event.stopPropagation();openPaymentWhatsAppReminderById(\''+a(p.id)+'\')">Avisar por WhatsApp</button>';
  }
  window.selectedPaymentReminders = window.selectedPaymentReminders || new Set();
  window.togglePaymentReminderSelection = function(id,checked){
    if(checked) selectedPaymentReminders.add(id); else selectedPaymentReminders.delete(id);
  };
  window.openSelectedWhatsAppReminders = function(){
    const ids = Array.from(selectedPaymentReminders).filter(function(id){
      const p = arr('payments').find(x=>x.id===id);
      return p && canSendPaymentReminder(p);
    });
    if(!ids.length){ if(typeof toast==='function') toast('Selecciona pagos pendientes o vencidos con telefono.'); return; }
    const buttons = ids.map(function(id){
      const p = arr('payments').find(x=>x.id===id);
      const c = getPaymentClient(p);
      return '<button type="button" class="btn btn-secondary" onclick="openPaymentWhatsAppReminderById(\''+a(id)+'\')">'+h(clientFullName(c))+' - '+h(p.estado)+' - '+h(safeMoney(p.monto))+'</button>';
    }).join('');
    showModal('Avisos por WhatsApp','Abrilos uno por uno para evitar bloqueos del navegador','<div class="grid gap-2">'+buttons+'</div>');
  };

  window.filterPayments = function(){
    const q = typeof getModuleSearch === 'function' ? getModuleSearch('pagos') : '';
    return arr('payments').filter(function(p){
      if(filters.payEstado && p.estado !== filters.payEstado) return false;
      if(filters.payMonth && paymentMonth(p) !== filters.payMonth) return false;
      if(filters.payClient && p.clienteId !== filters.payClient) return false;
      if(filters.payMin && Number(p.monto || 0) < Number(filters.payMin)) return false;
      if(filters.payMax && Number(p.monto || 0) > Number(filters.payMax)) return false;
      return !q || (typeof includesSearch === 'function' ? includesSearch(paymentSearchText(p),q) : normalizeText(paymentSearchText(p)).includes(normalizeText(q)));
    });
  };
  const baseRenderPagos = typeof renderPagos === 'function' ? renderPagos : null;
  if(baseRenderPagos){
    renderPagos = function(){
      if(typeof canViewPayments === 'function' && !canViewPayments()) return denied();
      const estado = filters.payEstado || filters.estado || '';
      if(filters.estado && !filters.payEstado) filters.payEstado = filters.estado;
      const extra = '<div class="advanced-filters">'+
        '<select class="input" onchange="filters.payEstado=this.value;filters.estado=this.value;render()"><option value="">Todos los estados</option>'+['Pagado','Pendiente','Vencido','Parcial'].map(s=>'<option '+(estado===s?'selected':'')+'>'+s+'</option>').join('')+'</select>'+
        '<input class="input" type="month" value="'+a(filters.payMonth||'')+'" onchange="filters.payMonth=this.value;render()" aria-label="Mes">'+
        '<select class="input" onchange="filters.payClient=this.value;render()"><option value="">Cliente</option>'+arr('clients').map(c=>'<option value="'+a(c.id)+'" '+(filters.payClient===c.id?'selected':'')+'>'+h(clientFullName(c))+'</option>').join('')+'</select>'+
        '<input class="input" type="number" min="0" placeholder="Monto minimo" value="'+a(filters.payMin||'')+'" oninput="filters.payMin=this.value;render()">'+
        '<input class="input" type="number" min="0" placeholder="Monto maximo" value="'+a(filters.payMax||'')+'" oninput="filters.payMax=this.value;render()">'+
        '<button type="button" class="btn btn-secondary" onclick="clearFilters()">Limpiar</button>'+
        '<button type="button" class="btn btn-primary" onclick="openSelectedWhatsAppReminders()">Avisar seleccionados por WhatsApp</button>'+
        (typeof isGeneral==='function' && isGeneral()?'<button onclick="newPayment()" class="btn btn-primary">Nuevo</button>':'')+
        '</div>';
      const list = filterPayments();
      return moduleToolbar('pagos',extra)+responsiveList(['Aviso','Cliente','Plan','Monto','Mes','Medio','Estado','Acciones'],list.map(function(p){
        const canPick = canSendPaymentReminder(p);
        const checkbox = canPick ? '<input class="wa-reminder-checkbox" type="checkbox" onchange="togglePaymentReminderSelection(\''+a(p.id)+'\',this.checked)" '+(selectedPaymentReminders.has(p.id)?'checked':'')+'>' : '-';
        return [checkbox,clientName(p.clienteId),(getPlan(p.planId)?.nombre||'-'),safeMoney(p.monto),p.mesAbonado||paymentMonth(p),p.medioPago||'-',statusBadge(p.estado),'<div class="payment-action-stack">'+paymentActions(p)+reminderButton(p)+'</div>'];
      }),list.map(function(p){
        return '<div class="card p-4"><b>'+h(clientName(p.clienteId))+'</b><div class="text-sm font-semibold text-[#7d7466]">'+h(getPlan(p.planId)?.nombre||'-')+' · '+h(safeMoney(p.monto))+' · '+h(p.mesAbonado||paymentMonth(p))+'</div><div class="mt-2">'+statusBadge(p.estado)+'</div><div class="mt-3 payment-action-stack">'+paymentActions(p)+reminderButton(p)+'</div></div>';
      }));
    };
  }

  window.filterClients = function(){
    const q = typeof getModuleSearch === 'function' ? getModuleSearch('clientes') : '';
    return (typeof visibleClients === 'function' ? visibleClients() : arr('clients')).filter(function(c){
      if(filters.clientEstado && c.estado !== filters.clientEstado) return false;
      if(filters.clientPlan && c.planId !== filters.clientPlan) return false;
      const pays = arr('payments').filter(p=>p.clienteId===c.id);
      if(filters.clientDebt === 'pending' && !pays.some(p=>p.estado==='Pendiente')) return false;
      if(filters.clientDebt === 'overdue' && !pays.some(p=>p.estado==='Vencido')) return false;
      return !q || (typeof includesSearch === 'function' ? includesSearch(clientSearchText(c),q) : normalizeText(clientSearchText(c)).includes(normalizeText(q)));
    });
  };
  const baseRenderClientes = typeof renderClientes === 'function' ? renderClientes : null;
  if(baseRenderClientes){
    renderClientes = function(){
      const extra = '<div class="advanced-filters">'+
        '<select class="input" onchange="filters.clientEstado=this.value;render()"><option value="">Todos</option><option '+(filters.clientEstado==='Activo'?'selected':'')+'>Activo</option><option '+(filters.clientEstado==='Inactivo'?'selected':'')+'>Inactivo</option></select>'+
        '<select class="input" onchange="filters.clientDebt=this.value;render()"><option value="">Pagos</option><option value="pending" '+(filters.clientDebt==='pending'?'selected':'')+'>Con pagos pendientes</option><option value="overdue" '+(filters.clientDebt==='overdue'?'selected':'')+'>Con pagos vencidos</option></select>'+
        '<select class="input" onchange="filters.clientPlan=this.value;render()"><option value="">Plan</option>'+arr('plans').map(p=>'<option value="'+a(p.id)+'" '+(filters.clientPlan===p.id?'selected':'')+'>'+h(p.nombre)+'</option>').join('')+'</select>'+
        '<button type="button" class="btn btn-secondary" onclick="clearFilters()">Limpiar</button>'+
        (typeof isGeneral==='function' && isGeneral()?'<button onclick="newClient()" class="btn btn-primary">Nuevo</button>':'')+
        '</div>';
      const list = filterClients();
      return moduleToolbar('clientes',extra)+responsiveList(['Cliente','DNI','Plan','Estado','Pago','Acciones'],list.map(c=>[h(clientFullName(c)),h(c.dni||'-'),h(getPlan(c.planId)?.nombre||'-'),statusBadge(c.estado),paymentSummary(c.id),clientActions(c)]),list.map(c=>typeof mobileClient==='function'?mobileClient(c):'<div class="card p-4"><b>'+h(clientFullName(c))+'</b><div class="mt-3">'+clientActions(c)+'</div></div>'));
    };
  }
  window.clearFilters = function(){filters={}; if(typeof render==='function') render();};

  function agendaDateFromSelected(){return agendaState?.currentDate ? new Date(agendaState.currentDate) : new Date();}
  function setAgendaView(mode){agendaState.viewMode = mode; render();}
  window.setAgendaView = setAgendaView;
  window.changeAgendaDate = function(direction){
    const d = agendaDateFromSelected();
    const mode = agendaState.viewMode || 'week';
    if(mode === 'month') d.setMonth(d.getMonth()+direction);
    else d.setDate(d.getDate() + direction*(mode==='day'?1:7));
    agendaState.currentDate = d;
    agendaState.selectedMonth = d.getMonth();
    agendaState.selectedYear = d.getFullYear();
    render();
  };
  window.getClassOccupancyStatus = function(clase){
    const used = (clase?.clientesIds || []).length;
    if(clase?.cupoManualCompleto || used >= MAX_CUPO) return {label:'Completo',className:'status-full'};
    if(used >= Math.max(1,MAX_CUPO-1)) return {label:'Casi lleno',className:'status-almost-full'};
    return {label:'Disponible',className:'status-available'};
  };
  function classCard(cl,date){
    const status = getClassOccupancyStatus(cl);
    const agendaDate = date || cl.agendaDate || getClassDateForWeek(cl,getStartOfWeek(agendaDateFromSelected()));
    return '<article class="agenda-class-card '+status.className+'" onclick="viewClass(\''+a(cl.id)+'\')">'+
      '<div class="agenda-class-main"><div><div class="agenda-class-title">'+h(cl.hora||'')+' · '+h(userName(cl.personalId))+'</div><div class="agenda-class-meta">'+h((cl.clientesIds||[]).map(clientName).join(', ')||'Sin alumnas')+'</div></div><div class="flex flex-wrap gap-2">'+statusBadge(status.label)+cupoBadge(cl)+'</div></div>'+
      '<div class="agenda-class-actions" onclick="event.stopPropagation()"><button class="btn btn-secondary" onclick="viewClass(\''+a(cl.id)+'\')">Ver detalle</button>'+(canEdit('classes',cl)?'<button class="btn btn-secondary" onclick="editClass(\''+a(cl.id)+'\')">Editar</button><button class="btn btn-secondary" onclick="duplicateClass(\''+a(cl.id)+'\')">Duplicar clase</button><button class="btn btn-secondary" onclick="openRepeatClassWeekly(\''+a(cl.id)+'\')">Repetir semanalmente</button><button class="btn btn-secondary" onclick="markClassComplete(\''+a(cl.id)+'\')">Marcar completa</button>':'')+(canDelete('classes',cl)?'<button class="btn btn-delete btn-small" onclick="deleteClass(\''+a(cl.id)+'\')">Eliminar</button>':'')+'</div>'+
      '</article>';
  }
  window.renderDayView = function(){
    const d = agendaDateFromSelected();
    const start = getStartOfWeek(d);
    const list = visibleClasses().map(cl=>({...cl,agendaDate:getClassDateForWeek(cl,start)})).filter(cl=>cl.agendaDate && dateKey(cl.agendaDate)===dateKey(d) && classMatchesAgendaFilters(cl)).sort((a,b)=>String(a.hora).localeCompare(String(b.hora)));
    return '<section class="agenda-day-block"><div class="agenda-day-header"><div><div class="agenda-day-title">'+h(formatAgendaDate(d))+'</div><div class="agenda-day-summary">'+list.length+' clases</div></div></div><div class="agenda-day-content">'+(list.length?list.map(c=>classCard(c,d)).join(''):noResults())+'</div></section>';
  };
  window.renderWeekView = function(){return renderCollapsibleAgenda(false);};
  window.renderMonthView = function(){
    const base = new Date(agendaState.selectedYear,agendaState.selectedMonth,1);
    const first = new Date(base);
    first.setDate(1 - ((first.getDay()+6)%7));
    const cells = Array.from({length:42},function(_,i){const d=new Date(first);d.setDate(first.getDate()+i);return d;});
    return '<div class="agenda-calendar-grid">'+cells.map(function(d){
      const inMonth = d.getMonth()===Number(agendaState.selectedMonth);
      const weekStart = getStartOfWeek(d);
      const list = visibleClasses().map(cl=>({...cl,agendaDate:getClassDateForWeek(cl,weekStart)})).filter(cl=>cl.agendaDate && dateKey(cl.agendaDate)===dateKey(d)).sort((a,b)=>String(a.hora).localeCompare(String(b.hora))).slice(0,4);
      return '<section class="agenda-month-cell '+(inMonth?'':'muted')+'"><div class="agenda-month-day"><span>'+h(new Intl.DateTimeFormat('es-AR',{weekday:'short'}).format(d))+'</span><span>'+d.getDate()+'</span></div>'+list.map(cl=>'<div class="agenda-mini-class" onclick="viewClass(\''+a(cl.id)+'\')">'+h(cl.hora)+' · '+h(userName(cl.personalId))+'</div>').join('')+'</section>';
    }).join('')+'</div>';
  };
  window.renderAgendaView = function(){
    const mode = agendaState.viewMode || 'week';
    if(mode==='day') return renderDayView();
    if(mode==='month') return renderMonthView();
    return renderWeekView();
  };
  const baseRenderAgenda = typeof renderAgenda === 'function' ? renderAgenda : null;
  if(baseRenderAgenda){
    renderAgenda = function(){
      const mode = agendaState.viewMode || 'week';
      const controls = '<div class="agenda-view-toolbar"><button class="btn btn-secondary" onclick="goToToday()">Hoy</button><button class="btn btn-secondary" onclick="changeAgendaDate(-1)">Anterior</button><button class="btn btn-secondary" onclick="changeAgendaDate(1)">Siguiente</button><select class="input" onchange="setAgendaMonth(this.value)">'+Array.from({length:12},(_,i)=>'<option value="'+i+'" '+(Number(agendaState.selectedMonth)===i?'selected':'')+'>'+h(new Intl.DateTimeFormat('es-AR',{month:'long'}).format(new Date(2026,i,1)).replace(/^./,m=>m.toUpperCase()))+'</option>').join('')+'</select><select class="input" onchange="setAgendaYear(this.value)">'+Array.from({length:9},(_,i)=>new Date().getFullYear()-4+i).map(y=>'<option value="'+y+'" '+(Number(agendaState.selectedYear)===y?'selected':'')+'>'+y+'</option>').join('')+'</select><div class="agenda-view-tabs"><button class="'+(mode==='day'?'active':'')+'" onclick="setAgendaView(\'day\')">Dia</button><button class="'+(mode==='week'?'active':'')+'" onclick="setAgendaView(\'week\')">Semana</button><button class="'+(mode==='month'?'active':'')+'" onclick="setAgendaView(\'month\')">Mes</button></div></div>';
      return moduleToolbar('agenda',controls)+renderAgendaFilters()+renderAgendaView();
    };
  }
  window.duplicateClass = function(classId){
    const cl = arr('classes').find(c=>c.id===classId);
    if(!cl) return toast && toast('Clase no encontrada.');
    const daysOptions = days.map(d=>'<option '+(d===cl.dia?'selected':'')+'>'+h(d)+'</option>').join('');
    const staffOptions = arr('users').filter(u=>u.estado==='Activo').map(u=>'<option value="'+a(u.id)+'" '+(u.id===cl.personalId?'selected':'')+'>'+h(clientFullName(u))+'</option>').join('');
    showModal('Duplicar clase','Se copiara sin alumnas por defecto','<form onsubmit="saveDuplicateClass(event,\''+a(classId)+'\')" class="grid gap-3 md:grid-cols-2"><label class="label">Dia<select name="dia" class="input">'+daysOptions+'</select></label><label class="label">Hora<input name="hora" class="input" type="time" value="'+a(cl.hora||'')+'"></label><label class="label md:col-span-2">Profesora<select name="personalId" class="input">'+staffOptions+'</select></label><button class="btn btn-primary md:col-span-2">Crear duplicado</button></form>');
  };
  window.saveDuplicateClass = function(event,classId){
    event.preventDefault();
    const source = arr('classes').find(c=>c.id===classId);
    if(!source) return;
    const fd = Object.fromEntries(new FormData(event.target).entries());
    const copy = {...source,...fd,id:uid(),clientesIds:[],estado:'Activa',createdAt:now(),updatedAt:now(),observaciones:(source.observaciones||'')+' Duplicada sin alumnas'};
    delete copy.cupoManualCompleto;
    arr('classes').push(copy);
    logAudit('Duplicar clase','classes','Clase duplicada desde '+classId);
    saveDB(); closeModal(); render(); toast('Clase duplicada sin alumnas');
  };
  window.openRepeatClassWeekly = function(classId){
    showModal('Repetir semanalmente','No se duplican alumnas automaticamente','<form onsubmit="repeatClassWeeklyFromForm(event,\''+a(classId)+'\')" class="grid gap-3"><label class="label">Cantidad de semanas<input class="input" type="number" name="weeks" min="1" max="24" value="4"></label><button class="btn btn-primary">Crear repeticiones</button></form>');
  };
  window.repeatClassWeeklyFromForm = function(event,classId){
    event.preventDefault();
    repeatClassWeekly(classId,Number(new FormData(event.target).get('weeks')||0));
  };
  window.repeatClassWeekly = function(classId,weeks){
    const source = arr('classes').find(c=>c.id===classId);
    if(!source || !weeks) return;
    if(!confirm('Se crearan '+weeks+' copias de esta clase sin alumnas. ¿Continuar?')) return;
    for(let i=1;i<=weeks;i++){
      const copy = {...source,id:uid(),clientesIds:[],estado:'Activa',createdAt:now(),updatedAt:now(),observaciones:(source.observaciones||'')+' Repeticion semanal '+i};
      delete copy.cupoManualCompleto;
      arr('classes').push(copy);
    }
    logAudit('Repetir clase','classes','Se crearon '+weeks+' repeticiones desde '+classId);
    saveDB(); closeModal(); render(); toast('Repeticiones creadas sin alumnas');
  };
  window.markClassComplete = function(classId){
    const cl = arr('classes').find(c=>c.id===classId);
    if(!cl) return;
    cl.cupoManualCompleto = true;
    cl.updatedAt = now();
    logAudit('Marcar clase completa','classes','Clase marcada como completa '+classId);
    saveDB(); render(); toast('Clase marcada como completa');
  };

  const baseRenderActionsMenu = typeof renderActionsMenu === 'function' ? renderActionsMenu : null;
  if(baseRenderActionsMenu){
    renderActionsMenu = function(entityType,item){
      const id = item?.id;
      if(!id) return '-';
      let items = [];
      if(entityType==='clients'){
        items.push(['Ver detalle',"viewClient('"+id+"')"]);
        if(canEdit('clients',item)) items.push(['Editar',"editClient('"+id+"')"],['Dar de baja',"lowClient('"+id+"')"],['Eliminar',"deleteClient('"+id+"')",true]);
      }
      if(entityType==='users'){
        items.push(['Ver detalle',"viewUser('"+id+"')"]);
        if(canEdit('users',item)) items.push(['Editar',"editUser('"+id+"')"],['Dar de baja',"lowUser('"+id+"')"]);
        if(canDelete('users',item)) items.push(['Eliminar',"deleteUser('"+id+"')",true]);
      }
      if(entityType==='plans'){
        items.push(['Editar',"editPlan('"+id+"')"],[item.estado==='Activo'?'Desactivar':'Activar',"togglePlan('"+id+"')"]);
        if(canDelete('plans',item)) items.push(['Eliminar',"deletePlan('"+id+"')",true]);
      }
      if(entityType==='classes'){
        items.push(['Ver detalle',"viewClass('"+id+"')"]);
        if(canEdit('classes',item)) items.push(['Editar',"editClass('"+id+"')"],['Duplicar clase',"duplicateClass('"+id+"')"],['Repetir semanalmente',"openRepeatClassWeekly('"+id+"')"],['Marcar completa',"markClassComplete('"+id+"')"],['Cancelar',"cancelClass('"+id+"')"]);
        if(canDelete('classes',item)) items.push(['Eliminar',"deleteClass('"+id+"')",true]);
      }
      if(entityType==='schedules'){
        if(canEdit('schedules',item)) items.push(['Editar',"editSchedule('"+id+"')"],['Mover cliente',"moveSchedule('"+id+"')"],['Quitar cliente',"removeSchedule('"+id+"')",true]);
        if(canDelete('schedules',item)) items.push(['Eliminar',"deleteSchedule('"+id+"')",true]);
      }
      if(entityType==='payments'){
        items.push(['Ver detalle',"viewPayment('"+id+"')"]);
        if(canSendPaymentReminder(item)) items.push(['Avisar WhatsApp',"openPaymentWhatsAppReminderById('"+id+"')"]);
        if(canEdit('payments',item)) items.push(['Editar',"editPayment('"+id+"')"]);
        if(canDelete('payments',item)) items.push(['Eliminar',"deletePayment('"+id+"')",true]);
      }
      if(!items.length) return '-';
      const open = openActionsMenu.type===entityType && openActionsMenu.id===id;
      return '<div class="action-cell action-menu '+(open?'open':'')+'" data-action-type="'+a(entityType)+'" data-action-id="'+a(id)+'" onclick="event.stopPropagation()"><button class="action-trigger" type="button" title="Acciones" aria-label="Abrir menu" aria-expanded="'+(open?'true':'false')+'" onclick="event.stopPropagation();toggleActionsMenu(\''+a(entityType)+'\',\''+a(id)+'\')">⋮</button><div class="action-dropdown" role="menu">'+items.map(function(item){return '<button type="button" class="action-option '+(item[2]?'danger':'')+'" onclick="event.stopPropagation();closeActionsMenu();'+item[1]+'">'+h(item[0])+'</button>';}).join('')+'</div></div>';
    };
  }

  window.globalSearch = function(query){
    const q = normalizeText(query);
    if(!q) return {};
    const match = function(text){return normalizeText(text).includes(q);};
    return {
      Clientes: arr('clients').filter(c=>match(clientSearchText(c))).slice(0,5).map(c=>({title:clientFullName(c),meta:(c.telefono||'-')+' · '+(c.estado||'-'),action:"viewClient('"+c.id+"')"})),
      Pagos: arr('payments').filter(p=>match(paymentSearchText(p))).slice(0,5).map(p=>({title:clientName(p.clienteId),meta:safeMoney(p.monto)+' · '+p.estado+' · '+(p.fechaPago||p.mesAbonado||'-'),action:"viewPayment('"+p.id+"')"})),
      Clases: arr('classes').filter(c=>match(classSearchText(c))).slice(0,5).map(c=>({title:(c.dia||'-')+' '+(c.hora||''),meta:userName(c.personalId)+' · '+(c.estado||'-'),action:"viewClass('"+c.id+"')"})),
      Personal: arr('users').filter(u=>match(userSearchText(u))).slice(0,5).map(u=>({title:clientFullName(u),meta:(u.rol||'-')+' · '+(u.estado||'-'),action:"viewUser('"+u.id+"')"})),
      Planes: arr('plans').filter(p=>match(planSearchText(p))).slice(0,5).map(p=>({title:p.nombre,meta:safeMoney(p.precio)+' · '+(p.estado||'-'),action:"go('planes')"})),
      Horarios: arr('schedules').filter(s=>match(scheduleSearchText(s))).slice(0,5).map(s=>({title:clientName(s.clienteId),meta:(s.dia||'-')+' '+(s.horario||''),action:"go('horarios')"}))
    };
  };
  window.renderSearchResults = function(results){
    const panel = document.getElementById('globalSearchResults');
    if(!panel) return;
    const groups = Object.entries(results || {}).filter(([,items])=>items.length);
    if(!groups.length){panel.innerHTML='<div class="chart-empty">No se encontraron coincidencias</div>';panel.classList.add('show');return;}
    panel.innerHTML = groups.map(function(entry){
      return '<div class="global-search-group"><h4>'+h(entry[0])+'</h4>'+entry[1].map(function(item){
        return '<button type="button" class="global-search-result" onclick="'+a(item.action)+';hideGlobalSearchResults()"><span>'+h(item.title)+'<small>'+h(item.meta)+'</small></span><span>Ver</span></button>';
      }).join('')+'</div>';
    }).join('');
    panel.classList.add('show');
  };
  window.hideGlobalSearchResults = function(){
    const panel = document.getElementById('globalSearchResults');
    if(panel) panel.classList.remove('show');
  };
  const debouncedGlobalSearch = debounce(function(value){
    if(!value){hideGlobalSearchResults();return;}
    renderSearchResults(globalSearch(value));
  },250);
  function setupGlobalSearchInput(){
    const input = document.getElementById('globalSearch');
    if(!input || input.dataset.enterpriseSearch==='1') return;
    input.dataset.enterpriseSearch='1';
    const parent = input.closest('.topbar-search');
    if(parent && !parent.classList.contains('global-search-shell')) parent.classList.add('global-search-shell');
    if(parent && !document.getElementById('globalSearchResults')){
      parent.insertAdjacentHTML('beforeend','<div id="globalSearchResults" class="global-search-panel"></div>');
    }
    input.addEventListener('input',function(){debouncedGlobalSearch(this.value);});
    input.addEventListener('keydown',function(event){if(event.key==='Escape') hideGlobalSearchResults();});
  }
  document.addEventListener('click',function(event){
    if(!event.target.closest('.global-search-shell')) hideGlobalSearchResults();
  });

  function auditStore(){try{return JSON.parse(localStorage.getItem('nihuenAuditLog')||'[]');}catch(err){return [];}}
  function saveAuditStore(logs){localStorage.setItem('nihuenAuditLog',JSON.stringify(logs.slice(0,300)));}
  window.logAudit = window.logAudit || function(action,entity,description){
    const entry = {id:uid(),action:action,entity:entity,description:description||'',role:currentUser?.rol||'sin sesion',user:currentUser?.usuario||currentUser?.nombre||'sistema',createdAt:now()};
    const logs = [entry].concat(auditStore());
    saveAuditStore(logs);
    try{
      if(window.firebase && firebaseOnline && firestore){
        firestore.collection('audit_logs').add(entry).catch(function(err){console.warn('Audit Firestore error',err);});
      }
    }catch(err){}
  };
  window.renderAuditLog = function(){
    const logs = auditStore();
    if(!logs.length) return '<div class="empty-state">Todavia no hay historial de cambios.</div>';
    return '<div class="audit-list">'+logs.slice(0,80).map(function(l){
      return '<div class="audit-item"><b>'+h(l.action)+' · '+h(l.entity)+'</b><small>'+h(formatDate(l.createdAt))+' · '+h(l.user)+' · '+h(l.role)+'</small><div>'+h(l.description)+'</div></div>';
    }).join('')+'</div>';
  };
  function csvEscape(value){return '"'+String(value ?? '').replace(/"/g,'""')+'"';}
  function downloadText(filename,text,type){
    const blob = new Blob([text],{type:type || 'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url; link.download = filename; document.body.appendChild(link); link.click(); link.remove();
    setTimeout(()=>URL.revokeObjectURL(url),800);
  }
  window.exportToCSV = function(type){
    const rows = arr(type);
    if(!rows.length){toast && toast('No hay datos para exportar.');return;}
    const headers = Array.from(rows.reduce((set,row)=>{Object.keys(row).forEach(k=>set.add(k));return set;},new Set()));
    const csv = '\uFEFF' + headers.map(csvEscape).join(',') + '\n' + rows.map(row=>headers.map(k=>csvEscape(Array.isArray(row[k])?row[k].join(' | '):row[k])).join(',')).join('\n');
    downloadText('nihuen-'+type+'.csv',csv,'text/csv;charset=utf-8');
    logAudit('Exportar CSV',type,'Se exporto '+type+' a CSV');
  };
  window.exportFullBackup = function(){
    const backup = {
      generatedAt:now(),
      clientes:arr('clients'),
      pagos:arr('payments'),
      clases:arr('classes'),
      horarios:arr('schedules'),
      planes:arr('plans'),
      personal:arr('users'),
      configuracion:db.settings || {}
    };
    downloadText('nihuen-backup-'+dateKey(new Date())+'.json',JSON.stringify(backup,null,2),'application/json;charset=utf-8');
    logAudit('Exportar backup','backup','Se genero backup completo JSON');
  };
  window.validateBackup = function(data){
    const required = ['clientes','pagos','clases','horarios','planes','personal','configuracion'];
    const missing = required.filter(k=>!(k in (data||{})));
    if(missing.length) return 'Faltan claves: '+missing.join(', ');
    const arrays = ['clientes','pagos','clases','horarios','planes','personal'];
    const invalid = arrays.filter(k=>!Array.isArray(data[k]));
    if(invalid.length) return 'Estas claves deben ser listas: '+invalid.join(', ');
    return true;
  };
  window.importFullBackup = function(file){
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(){
      try{
        const data = JSON.parse(reader.result);
        const validation = validateBackup(data);
        if(validation !== true){toast && toast(validation);return;}
        if(!confirm('Este backup puede sobrescribir datos actuales. ¿Continuar?')) return;
        db.clients = data.clientes;
        db.payments = data.pagos;
        db.classes = data.clases;
        db.schedules = data.horarios;
        db.plans = data.planes;
        db.users = data.personal;
        db.settings = {...(db.settings||{}),...(data.configuracion||{})};
        logAudit('Importar backup','backup','Se importo backup JSON');
        saveDB(); render(); toast && toast('Backup importado correctamente.');
      }catch(err){toast && toast('El archivo no es un JSON valido.');}
    };
    reader.readAsText(file);
  };
  window.createManualBackup = function(){exportFullBackup();};
  function backupPanel(){
    return '<section class="card p-5 backup-panel"><h3 class="panel-title">Datos y respaldo</h3><p class="mt-1 text-sm font-bold text-[#66706A]">Herramientas administrativas para exportar, importar y auditar cambios.</p><div class="backup-actions">'+
      '<button class="btn btn-secondary" onclick="exportToCSV(\'clients\')">Exportar clientes a CSV</button>'+
      '<button class="btn btn-secondary" onclick="exportToCSV(\'payments\')">Exportar pagos a CSV</button>'+
      '<button class="btn btn-secondary" onclick="exportToCSV(\'classes\')">Exportar clases a CSV</button>'+
      '<button class="btn btn-primary" onclick="exportFullBackup()">Exportar todo a JSON</button>'+
      '<label class="btn btn-secondary">Importar backup JSON<input type="file" accept="application/json" hidden onchange="importFullBackup(this.files[0])"></label>'+
      '<button class="btn btn-secondary" onclick="createManualBackup()">Crear backup manual</button>'+
      '</div><h3 class="panel-title mt-5">Historial de cambios</h3>'+renderAuditLog()+'</section>';
  }
  const baseRenderConfig = typeof renderConfig === 'function' ? renderConfig : null;
  if(baseRenderConfig){
    renderConfig = function(){
      return baseRenderConfig.apply(this,arguments) + backupPanel();
    };
  }
  const baseSaveEntity = typeof saveEntity === 'function' ? saveEntity : null;
  if(baseSaveEntity){
    saveEntity = function(entityType,data,id){
      const result = baseSaveEntity.apply(this,arguments);
      logAudit(id?'Editar':'Crear',entityType,(id?'Se edito ':'Se creo ')+entityType);
      return result;
    };
  }
  const baseUpdateEntity = typeof updateEntity === 'function' ? updateEntity : null;
  if(baseUpdateEntity){
    updateEntity = function(entityType,id,data){
      const result = baseUpdateEntity.apply(this,arguments);
      logAudit('Editar',entityType,'Se actualizo '+entityType+' '+id);
      return result;
    };
  }
  const baseDeleteEntity = typeof deleteEntity === 'function' ? deleteEntity : null;
  if(baseDeleteEntity){
    deleteEntity = function(entityType,id){
      const result = baseDeleteEntity.apply(this,arguments);
      logAudit('Eliminar',entityType,'Se elimino '+entityType+' '+id);
      return result;
    };
  }
  const baseViewClient = typeof viewClient === 'function' ? viewClient : null;
  if(baseViewClient){
    viewClient = function(id){
      const c = getClient(id);
      if(!c) return baseViewClient.apply(this,arguments);
      const pays = arr('payments').filter(p=>p.clienteId===id);
      const cls = arr('classes').filter(cl=>(cl.clientesIds||[]).includes(id));
      const paymentRows = pays.length ? pays.map(function(p){
        return '<div class="rounded-2xl border border-[#DED6C8] bg-[#F7F4EF] p-3"><div class="flex flex-wrap items-center justify-between gap-2"><b>'+h(p.mesAbonado||paymentMonth(p))+' · '+h(safeMoney(p.monto))+'</b>'+statusBadge(p.estado)+'</div><div class="mt-2">'+reminderButton(p)+'</div></div>';
      }).join('') : '<div class="empty-state">Sin pagos</div>';
      showModal('Ficha de cliente',clientFullName(c),'<div class="grid gap-4 md:grid-cols-2"><div class="card p-4"><b>Datos</b><p>DNI: '+h(c.dni||'-')+'</p><p>Telefono: '+h(c.telefono||'-')+'</p><p>Direccion: '+h(c.direccion||'-')+'</p><p>Plan: '+h(getPlan(c.planId)?.nombre||'-')+'</p><p>Estado: '+h(c.estado||'-')+'</p></div><div class="card p-4"><b>Pago</b><p>Estado: '+paymentSummary(id)+'</p><p>Ultimo pago: '+h(pays[0]?.fechaPago||'-')+'</p><p>Proximo vencimiento: dia 10 del mes siguiente</p><p>Deuda: '+(pays.some(p=>['Pendiente','Vencido','Parcial'].includes(p.estado))?'Tiene deuda':'Sin deuda registrada')+'</p></div><div class="card p-4 md:col-span-2"><b>Horarios</b><p>'+h(cls.map(cl=>(cl.dia||'')+' '+(cl.hora||'')+' · '+userName(cl.personalId)).join('\n')||'Sin horarios asignados').replace(/\n/g,'<br>')+'</p></div><div class="card p-4 md:col-span-2"><b>Historial de pagos</b><div class="mt-3 grid gap-2">'+paymentRows+'</div></div></div>');
    };
  }

  const baseRender = typeof render === 'function' ? render : null;
  if(baseRender){
    render = function(){
      baseRender.apply(this,arguments);
      setupGlobalSearchInput();
      if(currentSection === 'dashboard') setTimeout(renderDashboardCharts,0);
      else destroyDashboardCharts();
    };
  }
  const originalSetModuleSearch = typeof setModuleSearch === 'function' ? setModuleSearch : null;
  if(originalSetModuleSearch){
    const debouncedModuleRender = debounce(function(){render();},250);
    setModuleSearch = function(key,value){
      searchState[key] = value;
      debouncedModuleRender();
    };
  }
  document.addEventListener('DOMContentLoaded',setupGlobalSearchInput);
})();
</script>
