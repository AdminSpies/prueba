function uid(){return 'id_'+Math.random().toString(36).slice(2,10)+'_'+Date.now().toString(36)}
function now(){return new Date().toISOString()}
function todayISO(){return new Date().toISOString().slice(0,10)}
function monthKey(d=new Date()){return d.toISOString().slice(0,7)}
function money(n){return '$ '+Number(n||0).toLocaleString('es-AR')}
function normalizeDB(data){
  const base = structuredClone(initialData);
  const merged = {...base, ...(data || {})};
  merged.settings = {...base.settings, ...(data?.settings || {})};
  ['users','clients','plans','classes','schedules','payments'].forEach(k=>{
    if(!Array.isArray(merged[k])) merged[k] = [];
  });
  if(!merged.schedules.length && merged.classes.length) merged.schedules = buildSchedules(merged);
  return merged;
}
function saveLocal(){localStorage.setItem('nihuenPilatesDB',JSON.stringify(db))}
function saveDB(){
  saveLocal();
  if(firebaseOnline && firestore && !applyingRemote){
    firestore.doc(FIRESTORE_DOC_PATH).set({
      payload: JSON.parse(JSON.stringify(db)),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    },{merge:false}).catch(err=>{
      console.error('Firestore save error',err);
      toast('No se pudo guardar en Firebase. Revisar reglas de Firestore.');
    });
  }
}
function loadDB(){
  const raw=localStorage.getItem('nihuenPilatesDB');
  if(raw){try{return normalizeDB(JSON.parse(raw))}catch(e){}}
  const copy=structuredClone(initialData);
  copy.schedules = buildSchedules(copy);
  localStorage.setItem('nihuenPilatesDB',JSON.stringify(copy));
  return copy;
}
async function initFirebaseRealtime(){
  try{
    if(!window.firebase) throw new Error('Firebase SDK no cargó');
    if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    firestore = firebase.firestore();
    firebaseOnline = true;
    try{await firestore.enablePersistence({synchronizeTabs:true})}catch(e){console.warn('Persistencia local Firebase no disponible',e?.code||e)}
    subscribeRealtime();
  }catch(err){
    console.error('Firebase init error',err);
    firebaseOnline = false;
    toast('Firebase no inició. La app queda en modo local.');
  }
}
function subscribeRealtime(){
  if(!firestore) return;
  if(unsubscribeRealtime) unsubscribeRealtime();
  unsubscribeRealtime = firestore.doc(FIRESTORE_DOC_PATH).onSnapshot(async snap=>{
    if(!snap.exists){
      const seed = normalizeDB(db);
      await firestore.doc(FIRESTORE_DOC_PATH).set({payload:seed,createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:false});
      return;
    }
    const remote = snap.data()?.payload;
    if(!remote) return;
    applyingRemote = true;
    db = normalizeDB(remote);
    saveLocal();
    applyingRemote = false;
    remoteLoaded = true;
    if(currentUser){
      const freshUser = db.users.find(u=>u.id===currentUser.id || u.usuario===currentUser.usuario);
      if(!freshUser || freshUser.estado!=='Activo'){
        currentUser=null;
        document.getElementById('appView').classList.add('hidden');
        document.getElementById('loginView').classList.remove('hidden');
        toast('La sesión fue cerrada porque el usuario cambió o fue dado de baja.');
      }else{
        currentUser=freshUser;
        render();
      }
    }
  },err=>{
    console.error('Firestore realtime error',err);
    toast('Sin sincronización en tiempo real. Revisar permisos de Firestore.');
  });
}
function buildSchedules(data){return data.classes.flatMap(cl=>cl.clientesIds.map(cid=>({id:uid(),clienteId:cid,personalId:cl.personalId,dia:cl.dia,horario:cl.hora,claseId:cl.id,estado:cl.estado==='Activa'?'Activo':'Cancelado',createdAt:now(),updatedAt:now()})))}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.remove('hidden');setTimeout(()=>el.classList.add('hidden'),2600)}
function isGeneral(){return currentUser?.rol==='general'}
function canViewPayments(){return isGeneral() || db.settings.allowPartialPaymentsView}
function canSeeClass(cl){return isGeneral() || cl.personalId===currentUser.id}
function getClient(id){return db.clients.find(x=>x.id===id)}
function getUser(id){return db.users.find(x=>x.id===id)}
function getPlan(id){return db.plans.find(x=>x.id===id)}
function visibleClasses(){return db.classes.filter(canSeeClass)}
function visibleClients(){if(isGeneral())return db.clients; const ids=new Set(visibleClasses().flatMap(c=>c.clientesIds)); return db.clients.filter(c=>ids.has(c.id))}
function statusBadge(s){const map={Activo:'badge-ok',Activa:'badge-ok',Pagado:'badge-ok',Pendiente:'badge-warn',Vencido:'badge-danger',Parcial:'badge-warn',Inactivo:'badge-muted',Cancelada:'badge-danger',Cancelado:'badge-danger',Finalizada:'badge-muted',Reprogramado:'badge-warn'};return `<span class="badge ${map[s]||'badge-muted'}">${s}</span>`}

function normalize(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function matchesText(obj,q,fields){if(!q)return true;const n=normalize(q);return fields.some(f=>normalize(obj[f]).includes(n))}

function stat(label,value,sub,type='ok'){
  return `<div class="metric ${type}"><div class="labelm">${label}</div><div class="valuem">${value}</div>${sub?`<div class="subm ${String(sub).includes('↑')?'up':''}">${sub}</div>`:''}</div>`
}
function renderDashboard(){
  const activeClients=db.clients.filter(c=>c.estado==='Activo').length;
  const activeUsers=db.users.filter(u=>u.estado==='Activo').length;
  const todayName=new Date().toLocaleDateString('es-AR',{weekday:'long'}).replace(/^./,m=>m.toUpperCase());
  const visible=visibleClasses().filter(c=>c.estado==='Activa');
  const dayClasses=visible.filter(c=>c.dia===todayName);
  const cuposToday=dayClasses.reduce((a,c)=>a+(MAX_CUPO-c.clientesIds.length),0);
  const pending=db.payments.filter(p=>p.estado==='Pendiente').length;
  const overdue=db.payments.filter(p=>p.estado==='Vencido').length;
  const pendingAmount=db.payments.filter(p=>p.estado==='Pendiente').reduce((a,p)=>a+Number(p.monto),0);
  const overdueAmount=db.payments.filter(p=>p.estado==='Vencido').reduce((a,p)=>a+Number(p.monto),0);
  const monthIncome=db.payments.filter(p=>p.estado==='Pagado'&&p.mesAbonado===monthKey()).reduce((a,p)=>a+Number(p.monto),0);
  const totalSlots=visible.length*MAX_CUPO;
  const occupied=visible.reduce((a,c)=>a+c.clientesIds.length,0);
  const occupancyPct=totalSlots?Math.round((occupied/totalSlots)*100):0;
  const cuposAll=visible.reduce((a,c)=>a+(MAX_CUPO-c.clientesIds.length),0);
  const full=visible.filter(c=>c.clientesIds.length>=MAX_CUPO).length;
  return `<div class="metric-grid">
    ${stat('Clientes activos',activeClients,'↑ 12 vs mes pasado','ok')}
    ${stat('Personal activo',activeUsers,'sin cambios','ok')}
    ${stat('Clases de hoy',dayClasses.length,'Ver agenda','ok')}
    ${canViewPayments()?stat('Pagos pendientes',pending,money(pendingAmount),'warn'):''}
    ${canViewPayments()?stat('Pagos vencidos',overdue,money(overdueAmount),'danger'):''}
    ${canViewPayments()?stat('Ingresos del mes',money(monthIncome),'↑ pagos registrados','ok'):''}
    ${stat('Horarios completos',occupancyPct+'%','de las clases','gold')}
    ${stat('Cupos disponibles',cuposAll,'de 8 por clase','ok')}
  </div>
  <section class="card quickbar mt-4">
    <h3 class="panel-title">Accesos rápidos</h3>
    <div class="quick-grid">
      ${isGeneral()?'<button onclick="newClient()" class="btn">Nuevo cliente</button><button onclick="newPayment()" class="btn">Nuevo pago</button><button onclick="newClass()" class="btn">Nueva clase</button><button onclick="newUser()" class="btn">Nuevo personal</button>':'<button onclick="go(\'clases\')" class="btn">Mis clases</button>'}
      <button onclick="go('agenda')" class="btn">Ver horarios</button>
      ${canViewPayments()?'<button onclick="filters.estado=\'Pendiente\';go(\'pagos\')" class="btn">Ver pagos pendientes</button>':''}
    </div>
  </section>
  <div class="dashboard-grid mt-4">
    <section class="card dash-panel">
      <div class="flex items-center justify-between gap-3"><h3 class="panel-title">Agenda semanal</h3><button onclick="go('agenda')" class="btn btn-soft !w-auto !py-2">Ver agenda completa</button></div>
      ${agendaMini()}
    </section>
    <section class="card dash-panel">
      <div class="flex items-center justify-between gap-3"><h3 class="panel-title">Pagos recientes</h3><button onclick="go('pagos')" class="btn btn-soft !w-auto !py-2">Ver todos</button></div>
      ${paymentsMini()}
    </section>
  </div>
  <div class="dash-lower">
    <section class="card dash-panel"><h3 class="panel-title">Clases y ocupación</h3>${occupationMini()}</section>
    <section class="card dash-panel"><h3 class="panel-title">Clientes destacados</h3>${clientsMini()}</section>
    <section class="card dash-panel"><h3 class="panel-title">Permisos y roles</h3>${rolesMini()}</section>
  </div>`
}
function agendaMini(){
  const hours=['07:00','08:00','09:00','10:00','18:00','19:00'];
  const short=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  let html='<div class="agenda-mini"><div class="agenda-cell agenda-head"></div>'+short.map((d,i)=>`<div class="agenda-cell agenda-head">${d}</div>`).join('');
  hours.forEach(h=>{html+=`<div class="agenda-cell agenda-hour">${h}</div>`; days.forEach(d=>{const cl=visibleClasses().find(c=>c.dia===d&&c.hora===h); html+=`<div class="agenda-cell">${cl?classChip(cl):''}</div>`})});
  return html+'</div>';
}
function classChip(cl){const full=cl.clientesIds.length>=MAX_CUPO;return `<div onclick="viewClass('${cl.id}')" class="class-chip ${full?'full':''}"><b>${cl.hora} Reformer</b><small><span>${shortUser(cl.personalId)}</span><span>${cl.clientesIds.length}/8</span></small>${full?'<span class="complete-tag">Completo</span>':''}</div>`}
function shortUser(id){const u=getUser(id);return u?`${u.nombre?.[0]||''}. ${u.apellido||''}`:'Sin prof.'}
function paymentsMini(){const list=[...db.payments].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')).slice(0,6);if(!canViewPayments())return '<p class="mt-4 text-sm font-bold text-[#7d7466]">Sin permiso para ver pagos.</p>'; if(!list.length)return '<p class="mt-4 text-sm font-bold text-[#7d7466]">Sin pagos cargados.</p>'; return `<table class="mini-table"><thead><tr><th>Cliente</th><th>Plan</th><th>Estado</th><th>Fecha</th><th>Medio</th><th>Monto</th></tr></thead><tbody>${list.map(p=>`<tr><td>${clientName(p.clienteId)}</td><td>${getPlan(p.planId)?.nombre||'-'}</td><td>${statusBadge(p.estado)}</td><td>${p.fechaPago||'-'}</td><td>${p.medioPago||'-'}</td><td>${money(p.monto)}</td></tr>`).join('')}</tbody></table>`}
function occupationMini(){const list=visibleClasses().slice(0,6); if(!list.length)return '<p class="mt-4 text-sm font-bold text-[#7d7466]">Sin clases cargadas.</p>'; return `<table class="mini-table"><thead><tr><th>Clase</th><th>Día</th><th>Hora</th><th>Profesor</th><th>Ocupación</th><th>Estado</th></tr></thead><tbody>${list.map(c=>{const pct=Math.round(c.clientesIds.length/MAX_CUPO*100);const cls=c.clientesIds.length>=8?'full':c.clientesIds.length>=7?'mid':'';return `<tr><td>Reformer</td><td>${c.dia}</td><td>${c.hora}</td><td>${shortUser(c.personalId)}</td><td><div class="occupancy ${cls}"><span style="width:${pct}%"></span></div><small>${c.clientesIds.length}/8</small></td><td>${c.clientesIds.length>=8?statusBadge('Completo'):statusBadge('Disponible')}</td></tr>`}).join('')}</tbody></table>`}
function clientsMini(){const list=db.clients.filter(c=>c.estado==='Activo').slice(0,6);return `<table class="mini-table"><thead><tr><th>Cliente</th><th>DNI</th><th>Plan</th><th>Estado</th><th>Último pago</th></tr></thead><tbody>${list.map(c=>`<tr><td>${c.nombre} ${c.apellido}</td><td>${c.dni}</td><td>${getPlan(c.planId)?.nombre||'-'}</td><td>${statusBadge(c.estado)}</td><td>${paymentSummary(c.id)}</td></tr>`).join('')}</tbody></table>`}
function rolesMini(){return `<div class="mt-4 space-y-3"><div class="rounded-2xl border border-[#e8e1d5] bg-[#fffdf8] p-4"><b>Administrador general</b><p class="mt-1 text-sm font-bold text-[#7d7466]">Acceso total a datos, precios, pagos, usuarios y reportes.</p><div class="mt-3 flex flex-wrap gap-2">${['Dashboard','Clientes','Personal','Pagos','Clases','Horarios','Reportes','Configuración'].map(x=>`<span class="badge badge-ok">${x}</span>`).join('')}</div></div><div class="rounded-2xl border border-[#e8e1d5] bg-[#fffdf8] p-4"><b>Administrador parcial / Personal</b><p class="mt-1 text-sm font-bold text-[#7d7466]">Acceso limitado a clases, horarios y clientes asignados.</p><div class="mt-3 flex flex-wrap gap-2">${['Dashboard limitado','Mis clases','Mis horarios','Clientes asignados'].map(x=>`<span class="badge badge-warn">${x}</span>`).join('')}</div></div></div>`}
function classList(list){if(!list.length)return '<p class="text-sm font-semibold text-[#7d7466]">Sin clases visibles.</p>'; return `<div class="space-y-3">${list.map(cl=>`<div class="rounded-2xl border border-[#eadfcf] bg-[#fffdf8] p-4"><div class="flex flex-wrap items-center justify-between gap-2"><b>${cl.dia} ${cl.hora}</b>${cupoBadge(cl)}</div><div class="mt-1 text-sm font-semibold text-[#7d7466]">Profesor: ${getUser(cl.personalId)?.nombre||'-'} ${getUser(cl.personalId)?.apellido||''}</div><div class="mt-2 text-xs font-bold text-[#8a8176]">${cl.clientesIds.map(id=>clientName(id)).join(', ')||'Sin alumnos'}</div></div>`).join('')}</div>`}
function clientName(id){const c=getClient(id);return c?`${c.nombre} ${c.apellido}`:'Cliente eliminado'}
function userName(id){const u=getUser(id);return u?`${u.nombre} ${u.apellido}`:'Sin personal'}

function controls(module,extra=''){return `<div class="mb-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between"><div class="flex flex-1 flex-col gap-3 md:flex-row"><input class="input" placeholder="Buscar" oninput="filters.q=this.value;render()" value="${filters.q||''}">${extra}</div></div>`}
function renderClientes(){
 const q=filters.q||'', estado=filters.estado||'', plan=filters.plan||'';
 let list=visibleClients().filter(c=>matchesText(c,q,['nombre','apellido','dni'])).filter(c=>!estado||c.estado===estado).filter(c=>!plan||c.planId===plan);
 const extra=`<select class="input" onchange="filters.estado=this.value;render()"><option value="">Estado</option><option ${estado==='Activo'?'selected':''}>Activo</option><option ${estado==='Inactivo'?'selected':''}>Inactivo</option></select><select class="input" onchange="filters.plan=this.value;render()"><option value="">Plan</option>${db.plans.map(p=>`<option value="${p.id}" ${plan===p.id?'selected':''}>${p.nombre}</option>`).join('')}</select>${isGeneral()?'<button onclick="newClient()" class="btn btn-primary">Nuevo</button>':''}`;
 return controls('clientes',extra)+responsiveList(['Cliente','DNI','Plan','Estado','Pago','Acciones'],list.map(c=>[`${c.nombre} ${c.apellido}`,c.dni,getPlan(c.planId)?.nombre||'-',statusBadge(c.estado),paymentSummary(c.id),clientActions(c)]),list.map(c=>mobileClient(c)));
}
function paymentSummary(cid){const ps=db.payments.filter(p=>p.clienteId===cid).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')); if(!ps.length)return statusBadge('Pendiente'); return statusBadge(ps[0].estado)}
function clientActions(c){return `<div class="flex flex-wrap gap-2"><button class="btn btn-soft !px-3 !py-2 !w-auto" onclick="viewClient('${c.id}')">Ver</button>${isGeneral()?`<button class="btn btn-soft !px-3 !py-2 !w-auto" onclick="editClient('${c.id}')">Editar</button><button class="btn btn-danger !px-3 !py-2 !w-auto" onclick="lowClient('${c.id}')">Baja</button>`:''}</div>`}
function mobileClient(c){return `<div class="card p-4"><div class="flex justify-between gap-3"><div><b>${c.nombre} ${c.apellido}</b><div class="text-sm font-semibold text-[#7d7466]">DNI ${c.dni}</div></div>${statusBadge(c.estado)}</div><div class="mt-2 text-sm"><b>Plan:</b> ${getPlan(c.planId)?.nombre||'-'}</div><div class="mt-3">${clientActions(c)}</div></div>`}
function responsiveList(headers,rows,cards){return `<div class="desktop-table overflow-x-auto"><table class="table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div><div class="mobile-card space-y-3">${cards.join('')}</div>`}

function renderPersonal(){if(!isGeneral())return denied(); const q=filters.q||'', rol=filters.rol||'', estado=filters.estado||''; let list=db.users.filter(u=>matchesText(u,q,['nombre','apellido','dni','usuario'])).filter(u=>!rol||u.rol===rol).filter(u=>!estado||u.estado===estado); const extra=`<select class="input" onchange="filters.rol=this.value;render()"><option value="">Rol</option><option value="general" ${rol==='general'?'selected':''}>Administrador general</option><option value="parcial" ${rol==='parcial'?'selected':''}>Administrador parcial</option></select><select class="input" onchange="filters.estado=this.value;render()"><option value="">Estado</option><option ${estado==='Activo'?'selected':''}>Activo</option><option ${estado==='Inactivo'?'selected':''}>Inactivo</option></select><button onclick="newUser()" class="btn btn-primary">Nuevo</button>`; return controls('personal',extra)+responsiveList(['Personal','DNI','Usuario','Rol','Estado','Acciones'],list.map(u=>[`${u.nombre} ${u.apellido}`,u.dni,u.usuario,u.rol==='general'?'General':'Parcial',statusBadge(u.estado),`<button class="btn btn-soft !px-3 !py-2 !w-auto" onclick="editUser('${u.id}')">Editar</button>`]),list.map(u=>`<div class="card p-4"><b>${u.nombre} ${u.apellido}</b><div class="text-sm font-semibold text-[#7d7466]">${u.rol==='general'?'Administrador general':'Administrador parcial'} · DNI ${u.dni}</div><div class="mt-2">${statusBadge(u.estado)}</div><div class="mt-3"><button class="btn btn-soft" onclick="editUser('${u.id}')">Editar</button></div></div>`));}
function renderPlanes(){if(!isGeneral())return denied(); const rows=db.plans.map(p=>[p.nombre,p.clasesSemanales,money(p.precio),statusBadge(p.estado),p.descripcion||'-',`<button class="btn btn-soft !px-3 !py-2 !w-auto" onclick="editPlan('${p.id}')">Editar</button>`]); return `<div class="mb-4 flex justify-end"><button onclick="newPlan()" class="btn btn-primary">Nuevo</button></div>`+responsiveList(['Plan','Clases semanales','Precio','Estado','Descripción','Acciones'],rows,db.plans.map(p=>`<div class="card p-4"><b>${p.nombre}</b><div class="text-sm font-semibold text-[#7d7466]">${p.clasesSemanales} clase/s semanal/es · ${money(p.precio)}</div><div class="mt-2">${statusBadge(p.estado)}</div><div class="mt-3"><button class="btn btn-soft" onclick="editPlan('${p.id}')">Editar</button></div></div>`));}
function renderClases(){const qDay=filters.dia||'', prof=filters.prof||''; let list=visibleClasses().filter(c=>!qDay||c.dia===qDay).filter(c=>!prof||c.personalId===prof); const extra=`<select class="input" onchange="filters.dia=this.value;render()"><option value="">Día</option>${days.map(d=>`<option ${qDay===d?'selected':''}>${d}</option>`).join('')}</select>${isGeneral()?`<select class="input" onchange="filters.prof=this.value;render()"><option value="">Profesor</option>${db.users.filter(u=>u.estado==='Activo').map(u=>`<option value="${u.id}" ${prof===u.id?'selected':''}>${u.nombre} ${u.apellido}</option>`).join('')}</select><button onclick="newClass()" class="btn btn-primary">Nuevo</button>`:''}`; return controls('clases',extra)+responsiveList(['Día','Hora','Profesor','Cupo','Estado','Alumnos','Acciones'],list.map(cl=>[cl.dia,cl.hora,userName(cl.personalId),cupoBadge(cl),statusBadge(cl.estado),cl.clientesIds.map(clientName).join(', ')||'-',classActions(cl)]),list.map(cl=>`<div class="card p-4"><div class="flex justify-between gap-3"><b>${cl.dia} ${cl.hora}</b>${cupoBadge(cl)}</div><div class="text-sm font-semibold text-[#7d7466]">${userName(cl.personalId)}</div><div class="mt-2 text-sm">${cl.clientesIds.map(clientName).join(', ')||'Sin alumnos'}</div><div class="mt-3">${classActions(cl)}</div></div>`));}
function classActions(cl){const canEdit=isGeneral()||cl.personalId===currentUser.id;return `<div class="flex flex-wrap gap-2"><button class="btn btn-soft !px-3 !py-2 !w-auto" onclick="viewClass('${cl.id}')">Ver</button>${canEdit?`<button class="btn btn-soft !px-3 !py-2 !w-auto" onclick="editClass('${cl.id}')">Editar</button><button class="btn btn-gold !px-3 !py-2 !w-auto" onclick="assignClient('${cl.id}')">Asignar</button>`:''}</div>`}
function renderHorarios(){let sc=db.schedules.filter(s=>isGeneral()||s.personalId===currentUser.id);return responsiveList(['Cliente','Personal','Día','Horario','Clase','Estado'],sc.map(s=>[clientName(s.clienteId),userName(s.personalId),s.dia,s.horario,s.claseId,statusBadge(s.estado)]),sc.map(s=>`<div class="card p-4"><b>${clientName(s.clienteId)}</b><div class="text-sm font-semibold text-[#7d7466]">${s.dia} ${s.horario} · ${userName(s.personalId)}</div><div class="mt-2">${statusBadge(s.estado)}</div></div>`));}
function renderPagos(){if(!canViewPayments())return denied(); const q=filters.q||'', estado=filters.estado||''; let list=db.payments.filter(p=>!estado||p.estado===estado).filter(p=>{const c=getClient(p.clienteId);return !q||normalize((c?.nombre||'')+' '+(c?.apellido||'')+' '+(c?.dni||'')).includes(normalize(q))}); const extra=`<select class="input" onchange="filters.estado=this.value;render()"><option value="">Estado</option><option>Pagado</option><option>Pendiente</option><option>Vencido</option><option>Parcial</option></select>${isGeneral()?'<button onclick="newPayment()" class="btn btn-primary">Nuevo</button>':''}`; return controls('pagos',extra)+responsiveList(['Cliente','Plan','Monto','Mes','Medio','Estado','Acciones'],list.map(p=>[clientName(p.clienteId),getPlan(p.planId)?.nombre||'-',money(p.monto),p.mesAbonado,p.medioPago,statusBadge(p.estado),paymentActions(p)]),list.map(p=>`<div class="card p-4"><b>${clientName(p.clienteId)}</b><div class="text-sm font-semibold text-[#7d7466]">${getPlan(p.planId)?.nombre||'-'} · ${money(p.monto)} · ${p.mesAbonado}</div><div class="mt-2">${statusBadge(p.estado)}</div><div class="mt-3">${paymentActions(p)}</div></div>`));}
function paymentActions(p){return `<div class="flex flex-wrap gap-2">${isGeneral()?`<button class="btn btn-soft !px-3 !py-2 !w-auto" onclick="editPayment('${p.id}')">Editar</button><button class="btn btn-danger !px-3 !py-2 !w-auto" onclick="deletePayment('${p.id}')">Eliminar</button>`:'-'}</div>`}
function renderAgenda(){const byDay=days.map(d=>[d,visibleClasses().filter(c=>c.dia===d).sort((a,b)=>a.hora.localeCompare(b.hora))]); return `<div class="grid gap-4 xl:grid-cols-2">${byDay.map(([d,list])=>`<div class="card p-5"><h3 class="mb-3 text-xl font-black">${d}</h3>${list.length?list.map(cl=>`<button onclick="viewClass('${cl.id}')" class="mb-3 w-full rounded-2xl border border-[#eadfcf] bg-[#fffdf8] p-4 text-left"><div class="flex flex-wrap items-center justify-between gap-2"><b>${cl.hora} · ${userName(cl.personalId)}</b>${cupoBadge(cl)}</div><div class="mt-2 text-xs font-bold text-[#7d7466]">${cl.clientesIds.map(clientName).join(', ')||'Sin alumnos'}</div></button>`).join(''):'<p class="text-sm font-semibold text-[#7d7466]">Sin clases cargadas.</p>'}</div>`).join('')}</div>`}
function renderReportes(){if(!isGeneral())return denied(); const incomeByPlan={}; db.payments.filter(p=>p.estado==='Pagado').forEach(p=>{const name=getPlan(p.planId)?.nombre||'Sin plan';incomeByPlan[name]=(incomeByPlan[name]||0)+Number(p.monto)}); const byMethod={}; db.payments.filter(p=>p.estado==='Pagado').forEach(p=>byMethod[p.medioPago]=(byMethod[p.medioPago]||0)+Number(p.monto)); return `<div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">${stat('Clientes activos',db.clients.filter(c=>c.estado==='Activo').length)}${stat('Clientes inactivos',db.clients.filter(c=>c.estado==='Inactivo').length)}${stat('Pagos pendientes',db.payments.filter(p=>p.estado==='Pendiente').length)}${stat('Pagos vencidos',db.payments.filter(p=>p.estado==='Vencido').length)}${stat('Clases completas',db.classes.filter(c=>c.clientesIds.length>=MAX_CUPO).length)}${stat('Cupos disponibles',db.classes.reduce((a,c)=>a+(MAX_CUPO-c.clientesIds.length),0))}</div><div class="mt-5 grid gap-4 lg:grid-cols-2"><div class="card p-5"><h3 class="text-xl font-black">Recaudación por plan</h3>${simpleBars(incomeByPlan)}</div><div class="card p-5"><h3 class="text-xl font-black">Recaudación por medio</h3>${simpleBars(byMethod)}</div></div>`}
function simpleBars(obj){const max=Math.max(1,...Object.values(obj)); return Object.entries(obj).map(([k,v])=>`<div class="mt-4"><div class="flex justify-between text-sm font-bold"><span>${k}</span><span>${money(v)}</span></div><div class="mt-2 h-3 overflow-hidden rounded-full bg-[#efe3ce]"><div class="h-full rounded-full bg-[#8a9472]" style="width:${(v/max)*100}%"></div></div></div>`).join('')||'<p class="mt-3 text-sm font-semibold text-[#7d7466]">Sin datos.</p>'}
function renderConfig(){if(!isGeneral())return denied(); return `<div class="card p-5"><h3 class="mb-4 text-xl font-black">Configuración general</h3><form onsubmit="saveSettings(event)" class="grid gap-4 md:grid-cols-2"><div><label class="label">Nombre del estudio</label><input name="studioName" class="input" value="${db.settings.studioName}"></div><div><label class="label">Personal parcial puede ver pagos</label><select name="allowPartialPaymentsView" class="input"><option value="false" ${!db.settings.allowPartialPaymentsView?'selected':''}>No</option><option value="true" ${db.settings.allowPartialPaymentsView?'selected':''}>Sí</option></select></div><button class="btn btn-primary md:col-span-2">Guardar configuración</button></form><div class="mt-5 rounded-2xl bg-[#f3eadb] p-4 text-sm font-semibold text-[#655c52]">La estructura está preparada para conectar Firebase Authentication y Firestore. Este HTML funciona como versión mínima autónoma.</div></div>`}
function renderPerfil(){return `<div class="card p-5"><h3 class="mb-4 text-xl font-black">Perfil de usuario</h3><div class="grid gap-3 md:grid-cols-2"><p><b>Nombre:</b> ${currentUser.nombre} ${currentUser.apellido}</p><p><b>DNI:</b> ${currentUser.dni}</p><p><b>Usuario:</b> ${currentUser.usuario}</p><p><b>Rol:</b> ${isGeneral()?'Administrador general':'Administrador parcial'}</p><p><b>Estado:</b> ${currentUser.estado}</p><p><b>Teléfono:</b> ${currentUser.telefono}</p></div></div>`}
function denied(){return `<div class="card p-6"><h3 class="text-xl font-black">Acceso restringido</h3><p class="mt-2 text-sm font-semibold text-[#7d7466]">Tu rol no tiene permiso para ver o modificar esta sección.</p></div>`}

function formGrid(fields){return `<div class="grid gap-4 md:grid-cols-2">${fields.map(f=>`<div class="${f.full?'md:col-span-2':''}"><label class="label">${f.label}</label>${f.html}</div>`).join('')}</div>`}
function clientForm(c={}){return `<form onsubmit="saveClient(event,'${c.id||''}')">${formGrid([
{label:'Apellido',html:`<input required name="apellido" class="input" value="${c.apellido||''}">`},{label:'Nombre',html:`<input required name="nombre" class="input" value="${c.nombre||''}">`},{label:'DNI',html:`<input required name="dni" class="input" value="${c.dni||''}">`},{label:'Fecha nacimiento',html:`<input type="date" name="fechaNacimiento" class="input" value="${c.fechaNacimiento||''}">`},{label:'Teléfono',html:`<input name="telefono" class="input" value="${c.telefono||''}">`},{label:'Dirección',html:`<input name="direccion" class="input" value="${c.direccion||''}">`},{label:'Estado',html:`<select name="estado" class="input"><option ${c.estado==='Activo'?'selected':''}>Activo</option><option ${c.estado==='Inactivo'?'selected':''}>Inactivo</option></select>`},{label:'Plan',html:`<select required name="planId" class="input">${db.plans.filter(p=>p.estado==='Activo'||p.id===c.planId).map(p=>`<option value="${p.id}" ${c.planId===p.id?'selected':''}>${p.nombre}</option>`).join('')}</select>`},{label:'Fecha alta',html:`<input type="date" name="fechaAlta" class="input" value="${c.fechaAlta||todayISO()}">`},{label:'Observaciones',full:true,html:`<textarea name="observaciones" class="input">${c.observaciones||''}</textarea>`}])}<button class="btn btn-primary mt-5">Guardar</button></form>`}
function newClient(){openModal('Nuevo cliente','Alta de cliente',clientForm())}
function editClient(id){openModal('Editar cliente','Modificación de cliente',clientForm(getClient(id)))}
function saveClient(e,id){e.preventDefault(); if(!isGeneral())return toast('Permiso denegado'); const fd=Object.fromEntries(new FormData(e.target).entries()); const dup=db.clients.find(c=>c.dni===fd.dni&&c.id!==id); if(dup)return toast('Ya existe un cliente con ese DNI'); if(id){Object.assign(getClient(id),fd,{updatedAt:now()})}else{db.clients.push({id:uid(),...fd,createdAt:now(),updatedAt:now()})} saveDB();closeModal();render();toast('Cliente guardado')}
function lowClient(id){if(!isGeneral())return; const c=getClient(id); const activePays=db.payments.some(p=>p.clienteId===id&&['Pendiente','Vencido','Parcial'].includes(p.estado)); if(activePays&&!confirm('El cliente tiene pagos activos. Confirmar baja.'))return; c.estado='Inactivo';c.updatedAt=now();saveDB();render();toast('Cliente dado de baja')}
function viewClient(id){const c=getClient(id); const pays=db.payments.filter(p=>p.clienteId===id); const cls=db.classes.filter(cl=>cl.clientesIds.includes(id)); openModal('Ficha de cliente',`${c.nombre} ${c.apellido}`,`<div class="grid gap-4 md:grid-cols-2"><div class="card p-4"><b>Datos</b><p>DNI: ${c.dni}</p><p>Teléfono: ${c.telefono||'-'}</p><p>Dirección: ${c.direccion||'-'}</p><p>Plan: ${getPlan(c.planId)?.nombre||'-'}</p><p>Estado: ${c.estado}</p></div><div class="card p-4"><b>Pago</b><p>Estado: ${paymentSummary(id)}</p><p>Último pago: ${pays[0]?.fechaPago||'-'}</p><p>Próximo vencimiento: día 10 del mes siguiente</p><p>Deuda: ${pays.some(p=>['Pendiente','Vencido','Parcial'].includes(p.estado))?'Tiene deuda':'Sin deuda registrada'}</p></div><div class="card p-4 md:col-span-2"><b>Horarios</b><p>${cls.map(cl=>`${cl.dia} ${cl.hora} · ${userName(cl.personalId)}`).join('<br>')||'Sin horarios asignados'}</p></div><div class="card p-4 md:col-span-2"><b>Historial de pagos</b><p>${pays.map(p=>`${p.mesAbonado} · ${money(p.monto)} · ${p.estado}`).join('<br>')||'Sin pagos'}</p></div></div>`)}

function editClass(id){const cl=db.classes.find(c=>c.id===id); if(!isGeneral()&&cl.personalId!==currentUser.id)return toast('No podés modificar horarios ajenos'); openModal('Editar clase','Modificar clase',classForm(cl))}
function saveClass(e,id){e.preventDefault(); const fd=Object.fromEntries(new FormData(e.target).entries()); if(!fd.dia||!fd.hora)return toast('Día y hora obligatorios'); if(!fd.personalId)return toast('La clase debe tener personal asignado'); if(!isGeneral()){const cl=db.classes.find(c=>c.id===id); if(!cl||cl.personalId!==currentUser.id)return toast('Permiso denegado')} if(id){const cl=db.classes.find(c=>c.id===id); Object.assign(cl,fd,{updatedAt:now()}); syncSchedules()}else{if(!isGeneral())return toast('Solo el administrador general puede crear clases'); db.classes.push({id:uid(),...fd,clientesIds:[],cupoMaximo:MAX_CUPO,createdAt:now(),updatedAt:now()})} saveDB();closeModal();render();toast('Clase guardada')}
function viewClass(id){const cl=db.classes.find(c=>c.id===id); openModal('Detalle de clase',`${cl.dia} ${cl.hora}`,`<div class="space-y-4"><div class="card p-4"><p><b>Profesor:</b> ${userName(cl.personalId)}</p><p><b>Cupo:</b> ${cl.clientesIds.length}/${MAX_CUPO}</p><p><b>Estado:</b> ${cl.estado}</p></div><div class="card p-4"><b>Alumnos</b><div class="mt-3 space-y-2">${cl.clientesIds.map(cid=>`<div class="flex items-center justify-between gap-2 rounded-2xl bg-[#f7efe2] p-3"><span>${clientName(cid)}</span>${(isGeneral()||cl.personalId===currentUser.id)?`<button class="btn btn-danger !w-auto !px-3 !py-2" onclick="removeClientFromClass('${cl.id}','${cid}')">Quitar</button>`:''}</div>`).join('')||'Sin alumnos'}</div></div>${(isGeneral()||cl.personalId===currentUser.id)?`<button onclick="assignClient('${cl.id}')" class="btn btn-primary">Agregar cliente</button>`:''}</div>`)}
function assignClient(id){const cl=db.classes.find(c=>c.id===id); if(!isGeneral()&&cl.personalId!==currentUser.id)return toast('No podés modificar horarios ajenos'); const opts=visibleClients().filter(c=>c.estado==='Activo'&&!cl.clientesIds.includes(c.id)).map(c=>`<option value="${c.id}">${c.nombre} ${c.apellido} · ${getPlan(c.planId)?.nombre||'-'}</option>`).join(''); openModal('Asignar cliente','Validación de cupo y plan',`<form onsubmit="addClientToClass(event,'${id}')"><label class="label">Cliente</label><select required name="clienteId" class="input"><option value="">Seleccionar cliente</option>${opts}</select><button class="btn btn-primary mt-5">Asignar</button></form>`)}
function addClientToClass(e,id){e.preventDefault(); const cid=new FormData(e.target).get('clienteId'); const cl=db.classes.find(c=>c.id===id); const validation=canAssignClient(cid,cl); if(validation!==true)return toast(validation); cl.clientesIds.push(cid); cl.updatedAt=now(); syncSchedules(); saveDB(); closeModal(); render(); toast('Cliente asignado')}
function removeClientFromClass(clid,cid){const cl=db.classes.find(c=>c.id===clid); if(!isGeneral()&&cl.personalId!==currentUser.id)return; cl.clientesIds=cl.clientesIds.filter(id=>id!==cid); syncSchedules(); saveDB(); closeModal(); viewClass(clid); render(); toast('Cliente quitado')}
function canAssignClient(cid,cl){if(cl.clientesIds.length>=MAX_CUPO)return 'El horario está completo'; if(cl.clientesIds.includes(cid))return 'El cliente ya está asignado'; const client=getClient(cid); if(!client.planId)return 'El cliente debe tener plan asignado'; const plan=getPlan(client.planId); const weekly=db.classes.filter(c=>c.clientesIds.includes(cid)&&c.estado==='Activa').length; if(weekly>=Number(plan?.clasesSemanales||0))return 'El cliente supera la cantidad de clases semanales de su plan'; return true}
function syncSchedules(){db.schedules=buildSchedules(db)}

/* ===== CRUD reutilizable, dashboard administrativo y sidebar plegable ===== */
const entityMap={clients:'clients',users:'users',plans:'plans',classes:'classes',schedules:'schedules',payments:'payments'};
const entitySingular={client:'clients',cliente:'clients',personal:'users',user:'users',usuario:'users',plan:'plans',class:'classes',clase:'classes',schedule:'schedules',horario:'schedules',payment:'payments',pago:'payments'};
function normalizeEntityType(type){return entityMap[type]?type:(entitySingular[type]||type)}
function escapeHtml(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escapeAttr(v){return escapeHtml(v).replace(/"/g,'&quot;')}
function selected(a,b){return String(a??'')===String(b??'')?'selected':''}
function checkedList(list,id){return (list||[]).includes(id)?'selected':''}
function getSchedule(id){return db.schedules.find(x=>x.id===id)}
function getEntity(type,id){type=normalizeEntityType(type); const arr=db[entityMap[type]]||[]; return arr.find(x=>x.id===id)}
function scheduleKey(clid,cid){return `${clid}:${cid}`}
function scheduleId(clid,cid){return `sch_${clid}_${cid}`}
function buildSchedules(data){
  const oldByKey=new Map((data.schedules||[]).map(s=>[scheduleKey(s.claseId,s.clienteId),s]));
  return (data.classes||[]).flatMap(cl=>(cl.clientesIds||[]).map(cid=>{
    const old=oldByKey.get(scheduleKey(cl.id,cid))||{};
    return {id:old.id||scheduleId(cl.id,cid),clienteId:cid,personalId:old.personalId||cl.personalId,dia:old.dia||cl.dia,horario:old.horario||cl.hora,claseId:cl.id,estado:old.estado||(cl.estado==='Activa'?'Activo':'Cancelado'),createdAt:old.createdAt||now(),updatedAt:old.updatedAt||now()}
  }))
}
function syncSchedules(){db.schedules=buildSchedules(db)}
function showModal(title,subtitle,html){document.getElementById('modalTitle').textContent=title;document.getElementById('modalSubtitle').textContent=subtitle||'';document.getElementById('modalBody').innerHTML=html;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show');document.getElementById('modalBody').innerHTML=''}
function confirmDelete(message,callback){
  window.pendingConfirmAction=callback;
  showModal('Confirmar eliminación','Esta acción no se puede deshacer',`<div class="rounded-2xl border border-[#eadfcf] bg-[#fffaf4] p-4 text-sm font-bold text-[#665d52]">${message}</div><div class="confirm-actions"><button class="btn btn-soft" onclick="closeModal()">Cancelar</button><button class="btn btn-delete" onclick="const cb=window.pendingConfirmAction; window.pendingConfirmAction=null; closeModal(); if(cb) cb();">Eliminar</button></div>`);
}
function canEdit(entityType,item){
  entityType=normalizeEntityType(entityType);
  if(!currentUser)return false;
  if(isGeneral())return true;
  if(entityType==='classes')return item?.personalId===currentUser.id;
  if(entityType==='schedules')return item?.personalId===currentUser.id;
  return false;
}
function canDelete(entityType,item){
  entityType=normalizeEntityType(entityType);
  if(!currentUser)return false;
  if(entityType==='classes')return isGeneral();
  if(entityType==='schedules')return isGeneral()||item?.personalId===currentUser.id;
  return isGeneral();
}
function updateEntity(entityType,id,data){
  entityType=normalizeEntityType(entityType);
  const item=getEntity(entityType,id);
  if(!item)return false;
  Object.assign(item,data,{updatedAt:now()});
  if(entityType==='classes')syncSchedules();
  saveDB();
  return true;
}
function saveEntity(entityType,data,id){
  entityType=normalizeEntityType(entityType);
  if(id)return updateEntity(entityType,id,data);
  const arr=db[entityMap[entityType]];
  arr.push({id:uid(),...data,createdAt:now(),updatedAt:now()});
  if(entityType==='classes')syncSchedules();
  saveDB();
  return true;
}
function deleteEntity(entityType,id){
  entityType=normalizeEntityType(entityType);
  if(entityType==='schedules'){const s=getSchedule(id); if(s) removeClientFromClass(s.claseId,s.clienteId,true); saveDB(); render(); return true}
  db[entityMap[entityType]]=db[entityMap[entityType]].filter(x=>x.id!==id);
  if(entityType==='clients'){db.classes.forEach(cl=>cl.clientesIds=(cl.clientesIds||[]).filter(cid=>cid!==id));syncSchedules()}
  if(entityType==='classes')syncSchedules();
  saveDB();
  render();
  return true;
}
function softDeleteEntity(entityType,id){
  entityType=normalizeEntityType(entityType);
  const item=getEntity(entityType,id);
  if(!item)return false;
  item.estado=entityType==='classes'?'Cancelada':'Inactivo';
  item.updatedAt=now();
  if(entityType==='classes')syncSchedules();
  saveDB();
  render();
  return true;
}
function openModal(type,itemId,legacyHtml){
  if(arguments.length>=3)return showModal(type,itemId,legacyHtml);
  type=normalizeEntityType(type);
  const item=itemId?getEntity(type,itemId):{};
  const mode=itemId?'Editar':'Nuevo';
  const forms={clients:clientForm,users:userForm,plans:planForm,classes:classForm,schedules:scheduleForm,payments:paymentForm};
  const labels={clients:'cliente',users:'personal',plans:'plan',classes:'clase',schedules:'horario',payments:'pago'};
  if(!forms[type])return;
  showModal(`${mode} ${labels[type]}`,itemId?'Modo edición: se actualizará el registro existente':'Modo creación: se generará un nuevo registro',forms[type](item||{}));
}
function actionBtn(label,cls,fn){return `<button class="btn ${cls}" onclick="${fn}">${label}</button>`}
function actionsWrap(html){return `<div class="actions">${html}</div>`}

function normalizeText(value){return String(value||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9ñ\s]/g,' ').replace(/\s+/g,' ').trim()}
function normalizeNameKey(value){return normalizeText(value).split(' ').filter(Boolean).sort().join(' ')}
function normalizeDay(value){const d=normalizeText(value);return {lunes:'Lunes',martes:'Martes',miercoles:'Miércoles',jueves:'Jueves',viernes:'Viernes',sabado:'Sábado',domingo:'Domingo'}[d]||''}
function normalizeHour(value){const m=normalizeText(value).match(/^(\d{1,2})\s*(h|hs)?$/); if(!m)return ''; return `${String(Number(m[1])).padStart(2,'0')}:00`}
function splitFullName(fullName){const parts=String(fullName||'').replace(/[(),;!]+/g,' ').replace(/\s+/g,' ').trim().split(' ').filter(Boolean);return {apellido:parts[0]||'',nombre:parts.slice(1).join(' ')}}
function generateUsername(fullName){return normalizeText(fullName).replace(/\s+/g,'.')}
function detectExcelSheets(){return {clientsSheet:'Hoja 1',scheduleSheet:'Hoja1',sourceFile:PILATES_EXCEL_IMPORT_DATA.sourceFile}}
function parseClientsSheet(){return PILATES_EXCEL_IMPORT_DATA.clientsFromSheet||[]}
function parseScheduleSheet(){return PILATES_EXCEL_IMPORT_DATA.scheduleGridFromSheet||[]}
function extractInstructorsFromSchedule(){return PILATES_EXCEL_IMPORT_DATA.staffFromSchedule||[]}
function extractClientsFromSchedule(){const ids=new Set((PILATES_EXCEL_IMPORT_DATA.schedulesFromSchedule||[]).map(s=>s.clienteImportId));return parseClientsSheet().filter(c=>ids.has(c.importId))}
function buildClientsFromExcel(){return parseClientsSheet()}
function buildStaffFromExcel(){return extractInstructorsFromSchedule()}
function buildClassesFromExcel(){return PILATES_EXCEL_IMPORT_DATA.classesFromSchedule||[]}
function buildSchedulesFromExcel(){return PILATES_EXCEL_IMPORT_DATA.schedulesFromSchedule||[]}
function calculateWeeklyClassesByClient(){const counts={};buildSchedulesFromExcel().forEach(s=>counts[s.clienteImportId]=(counts[s.clienteImportId]||0)+1);return counts}
function assignPlanByWeeklyFrequency(count){if(count<=0)return 'Clase individual'; if(count===1)return '1 vez por semana'; if(count===2)return '2 veces por semana'; if(count===3)return '3 veces por semana'; return '4 veces por semana'}
function detectDuplicates(preview){return preview?.duplicatesAvoided||0}
function detectOvercapacity(){return buildClassesFromExcel().filter(c=>(c.excedentes||[]).length>0)}

function makeImportPlanMap(targetDb,stats,dryRun){
  const basePlans=[
    {nombre:'Clase individual',clasesSemanales:1,precio:0,estado:'Activo',descripcion:'Plan base creado para importación desde Excel'},
    {nombre:'1 vez por semana',clasesSemanales:1,precio:0,estado:'Activo',descripcion:'Plan base creado para importación desde Excel'},
    {nombre:'2 veces por semana',clasesSemanales:2,precio:0,estado:'Activo',descripcion:'Plan base creado para importación desde Excel'},
    {nombre:'3 veces por semana',clasesSemanales:3,precio:0,estado:'Activo',descripcion:'Plan base creado para importación desde Excel'},
    {nombre:'4 veces por semana',clasesSemanales:4,precio:0,estado:'Activo',descripcion:'Plan base creado para importación desde Excel'}
  ];
  const map={};
  basePlans.forEach(plan=>{
    let existing=targetDb.plans.find(p=>normalizeText(p.nombre)===normalizeText(plan.nombre));
    if(!existing&&!dryRun){existing={id:uid(),...plan,createdAt:now(),updatedAt:now(),importSource:'PILATES.xlsx'};targetDb.plans.push(existing);stats.plansCreated++}
    if(!existing&&dryRun){existing={id:`preview_${normalizeText(plan.nombre).replace(/\s+/g,'_')}`};stats.plansCreated++}
    map[plan.nombre]=existing.id;
  });
  return map;
}
function mergeImportedData(targetDb,dryRun=false){
  const stats={clientsDetected:buildClientsFromExcel().length,staffDetected:buildStaffFromExcel().length,classesDetected:buildClassesFromExcel().length,schedulesDetected:buildSchedulesFromExcel().length,clientsCreated:0,staffCreated:0,classesCreated:0,schedulesCreated:0,plansCreated:0,duplicatesAvoided:0,classesUpdated:0,warnings:[...(PILATES_EXCEL_IMPORT_DATA.importWarnings||[])],overcapacity:detectOvercapacity(),doubtfulNames:(PILATES_EXCEL_IMPORT_DATA.importWarnings||[]).filter(w=>w.includes('Nombre dudoso'))};
  const planMap=makeImportPlanMap(targetDb,stats,dryRun);
  const clientIdByImport={};
  buildClientsFromExcel().forEach(item=>{
    const full=`${item.apellido||''} ${item.nombre||''}`.trim()||item.fullName;
    const key=item.normalizedKey||normalizeNameKey(full);
    let existing=targetDb.clients.find(c=>(item.dni&&c.dni===item.dni)||normalizeNameKey(`${c.apellido||''} ${c.nombre||''}`)===key);
    if(existing){stats.duplicatesAvoided++;clientIdByImport[item.importId]=existing.id;if(!existing.planId)existing.planId=planMap[item.planName]||planMap[assignPlanByWeeklyFrequency(item.weeklyClasses||0)];return}
    const id=uid();clientIdByImport[item.importId]=id;if(!dryRun){targetDb.clients.push({id,apellido:item.apellido||splitFullName(item.fullName).apellido,nombre:item.nombre||splitFullName(item.fullName).nombre,dni:item.dni||'',fechaNacimiento:'',telefono:'',direccion:'',estado:'Activo',planId:planMap[item.planName]||planMap[assignPlanByWeeklyFrequency(item.weeklyClasses||0)],fechaAlta:todayISO(),observaciones:item.observaciones||'Importado desde Excel PILATES.xlsx',createdAt:now(),updatedAt:now(),importSource:'PILATES.xlsx',importKey:key})}stats.clientsCreated++;
  });
  const staffIdByImport={};
  buildStaffFromExcel().forEach(item=>{
    const key=item.normalizedKey||normalizeNameKey(item.fullName);
    const userKey=normalizeText(item.usuario);
    let existing=targetDb.users.find(u=>normalizeText(u.usuario)===userKey||normalizeNameKey(`${u.apellido||''} ${u.nombre||''}`)===key);
    if(existing){stats.duplicatesAvoided++;staffIdByImport[item.importId]=existing.id;return}
    const id=uid();staffIdByImport[item.importId]=id;if(!dryRun){targetDb.users.push({id,apellido:item.apellido||splitFullName(item.fullName).apellido,nombre:item.nombre||splitFullName(item.fullName).nombre,dni:'',fechaNacimiento:'',direccion:'',telefono:'',titulos:'',usuario:item.usuario||generateUsername(item.fullName),passwordHash:item.passwordHash||'1234',rol:'parcial',estado:'Activo',horariosAsignados:item.horariosAsignados||[],observaciones:'Importado desde Excel PILATES.xlsx',createdAt:now(),updatedAt:now(),importSource:'PILATES.xlsx',importKey:key})}stats.staffCreated++;
  });
  const classIdByImport={};
  buildClassesFromExcel().forEach(item=>{
    const personalId=staffIdByImport[item.personalImportId]; if(!personalId){stats.warnings.push(`Clase omitida sin instructora: ${item.dia} ${item.hora}`);return}
    let existing=targetDb.classes.find(c=>c.dia===item.dia&&c.hora===item.hora&&c.personalId===personalId);
    const incoming=(item.clientesImportIds||[]).map(id=>clientIdByImport[id]).filter(Boolean);
    if(existing){
      stats.duplicatesAvoided++;stats.classesUpdated++;classIdByImport[item.importId]=existing.id;
      const current=new Set(existing.clientesIds||[]);
      const excedentes=[];
      incoming.forEach(cid=>{if(current.has(cid))return; if(current.size<MAX_CUPO){current.add(cid)}else{excedentes.push(clientName(cid))}});
      if(!dryRun){existing.clientesIds=[...current];existing.updatedAt=now(); if(item.observaciones&&!String(existing.observaciones||'').includes('Excel'))existing.observaciones=`${existing.observaciones||''} ${item.observaciones}`.trim(); if(excedentes.length)existing.observaciones=`${existing.observaciones||''} Excedentes detectados al fusionar Excel: ${excedentes.join(', ')}.`.trim()}
      if(excedentes.length)stats.warnings.push(`Sobrecupo al fusionar ${item.dia} ${item.hora}: ${excedentes.join(', ')}`);
      return;
    }
    const id=uid();classIdByImport[item.importId]=id;if(!dryRun){targetDb.classes.push({id,dia:item.dia,hora:item.hora,personalId,clientesIds:incoming.slice(0,MAX_CUPO),cupoMaximo:MAX_CUPO,estado:'Activa',observaciones:item.observaciones||'Importada desde Excel PILATES.xlsx',createdAt:now(),updatedAt:now(),importSource:'PILATES.xlsx',importKey:item.normalizedKey})}stats.classesCreated++;
  });
  buildSchedulesFromExcel().forEach(item=>{
    const clienteId=clientIdByImport[item.clienteImportId], claseId=classIdByImport[item.claseImportId], personalId=staffIdByImport[item.personalImportId];
    if(!clienteId||!claseId||!personalId)return;
    const exists=targetDb.schedules.some(s=>s.clienteId===clienteId&&s.claseId===claseId&&s.dia===item.dia&&s.horario===item.horario);
    if(exists){stats.duplicatesAvoided++;return}
    if(!dryRun){targetDb.schedules.push({id:scheduleId(claseId,clienteId),clienteId,personalId,dia:item.dia,horario:item.horario,claseId,estado:'Activo',createdAt:now(),updatedAt:now(),importSource:'PILATES.xlsx'})}stats.schedulesCreated++;
  });
  stats.lastImportAt=targetDb.settings?.pilatesImportLastAt||'';
  return stats;
}

function validateClassData(fd,id){
  if(!fd.dia||!fd.hora)return 'Día y hora obligatorios';
  if(!fd.personalId)return 'La clase debe tener personal asignado';
  if((fd.clientesIds||[]).length>MAX_CUPO)return 'No se permiten más de 8 clientes';
  for(const cid of fd.clientesIds||[]){
    const client=getClient(cid); const plan=getPlan(client?.planId);
    if(!plan)return `${clientName(cid)} no tiene plan asignado`;
    const weekly=db.classes.filter(c=>c.id!==id&&c.estado==='Activa'&&(c.clientesIds||[]).includes(cid)).length+(fd.estado==='Activa'?1:0);
    if(weekly>Number(plan.clasesSemanales||0))return `${clientName(cid)} supera las clases semanales de su plan`;
  }
  return true;
}
function saveClass(e,id){e.preventDefault(); const form=e.target; const fd=Object.fromEntries(new FormData(form).entries()); fd.clientesIds=Array.from(form.querySelector('[name="clientesIds"]').selectedOptions).map(o=>o.value); fd.cupoMaximo=MAX_CUPO; const existing=id?db.classes.find(c=>c.id===id):null; if(id&&!canEdit('classes',existing))return toast('Permiso denegado'); if(!id&&!isGeneral())return toast('Solo el administrador general puede crear clases'); const validation=validateClassData(fd,id); if(validation!==true)return toast(validation); saveEntity('classes',fd,id); closeModal(); render(); toast('Clase guardada')}

function canAssignClient(cid,cl,sourceClassId){
  if(!cl)return 'La clase seleccionada no existe';
  const already=(cl.clientesIds||[]).includes(cid);
  if((cl.clientesIds||[]).length>=MAX_CUPO&&!already)return 'El horario está completo';
  const client=getClient(cid); if(!client?.planId)return 'El cliente debe tener plan asignado';
  const plan=getPlan(client.planId); const weekly=db.classes.filter(c=>c.estado==='Activa'&&c.id!==sourceClassId&&c.id!==cl.id&&(c.clientesIds||[]).includes(cid)).length+(cl.estado==='Activa'?1:0);
  if(weekly>Number(plan?.clasesSemanales||0))return 'El cliente supera la cantidad de clases semanales de su plan';
  return true;
}
function saveSchedule(e,id){e.preventDefault(); const fd=Object.fromEntries(new FormData(e.target).entries()); if(!fd.dia||!fd.horario)return toast('No se permiten horarios sin día y hora'); const old=id?getSchedule(id):null; const target=db.classes.find(c=>c.id===fd.claseId); if(!target)return toast('Seleccioná una clase asociada'); if(old&&!canEdit('schedules',old))return toast('Permiso denegado'); if(!isGeneral()&&target.personalId!==currentUser.id)return toast('No podés modificar horarios ajenos'); const validation=canAssignClient(fd.clienteId,target,old?.claseId); if(validation!==true)return toast(validation); if(old?.claseId&&old.claseId!==fd.claseId){const prev=db.classes.find(c=>c.id===old.claseId); if(prev)prev.clientesIds=(prev.clientesIds||[]).filter(cid=>cid!==old.clienteId)} if(!(target.clientesIds||[]).includes(fd.clienteId))target.clientesIds.push(fd.clienteId); const scheduleData={...fd,id:id||scheduleId(fd.claseId,fd.clienteId),createdAt:old?.createdAt||now(),updatedAt:now()}; db.schedules=db.schedules.filter(s=>s.id!==id&&scheduleKey(s.claseId,s.clienteId)!==scheduleKey(fd.claseId,fd.clienteId)); db.schedules.push(scheduleData); saveDB(); closeModal(); render(); toast('Horario guardado')}
function removeSchedule(id){const s=getSchedule(id); if(!canEdit('schedules',s))return toast('Permiso denegado'); removeClientFromClass(s.claseId,s.clienteId,true); saveDB(); render(); toast('Cliente quitado del horario')}
function deleteSchedule(id){const s=getSchedule(id); if(!canDelete('schedules',s))return toast('Permiso denegado'); confirmDelete('Vas a eliminar solo esta asignación de horario. El cliente no se eliminará.',()=>{deleteEntity('schedules',id);toast('Horario eliminado')})}
function removeClientFromClass(clid,cid,silent=false){const cl=db.classes.find(c=>c.id===clid); if(!cl)return; if(!isGeneral()&&cl.personalId!==currentUser.id)return toast('No podés modificar horarios ajenos'); cl.clientesIds=(cl.clientesIds||[]).filter(id=>id!==cid); db.schedules=db.schedules.filter(s=>!(s.claseId===clid&&s.clienteId===cid)); cl.updatedAt=now(); if(!silent){saveDB(); closeModal(); viewClass(clid); render(); toast('Cliente quitado')}}
function addClientToClass(e,id){e.preventDefault(); const cid=new FormData(e.target).get('clienteId'); const cl=db.classes.find(c=>c.id===id); const validation=canAssignClient(cid,cl); if(validation!==true)return toast(validation); cl.clientesIds.push(cid); cl.updatedAt=now(); syncSchedules(); saveDB(); closeModal(); render(); toast('Cliente asignado')}

function normalizeSearch(value) {
  return String(value || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, ' ').trim();
}
const moduleSearchKeys={dashboard:'dashboard',clientes:'clients',personal:'staff',planes:'plans',clases:'classes',horarios:'schedules',pagos:'payments',agenda:'agenda',reportes:'reports',config:'settings',importar:'import'};
const moduleSearchPlaceholders={dashboard:'Buscar en dashboard por clienta, clase, pago o personal',clientes:'Buscar cliente por nombre, apellido, DNI o teléfono',personal:'Buscar personal por nombre, apellido, DNI o usuario',planes:'Buscar plan por nombre, cantidad de clases o estado',clases:'Buscar clase por día, hora, profesora o alumna',horarios:'Buscar horario por clienta, profesora, día u hora',pagos:'Buscar pago por clienta, mes, estado o medio de pago',agenda:'Buscar en agenda por clienta, profesora, día u horario',reportes:'Buscar dato o categoría del reporte',config:'Buscar configuración',importar:'Buscar registros, clases o advertencias importadas'};
function moduleKey(module){return moduleSearchKeys[module]||module}
function getModuleSearch(module){return searchState[moduleKey(module)]||''}
function setModuleSearch(key,value){searchState[key]=value;render()}
function clearModuleSearch(key){searchState[key]='';render()}
function haystack(...values){return normalizeSearch(values.flat(Infinity).filter(v=>v!==undefined&&v!==null).join(' '))}
function includesSearch(text,q){return !q||haystack(text).includes(normalizeSearch(q))}
function clientSearchText(c){return [c.nombre,c.apellido,c.dni,c.telefono,c.direccion,c.estado,getPlan(c.planId)?.nombre,c.observaciones].join(' ')}
function userSearchText(u){return [u.nombre,u.apellido,u.dni,u.usuario,u.telefono,u.rol,u.estado,u.titulos].join(' ')}
function planSearchText(p){return [p.nombre,p.clasesSemanales,p.precio,p.estado,p.descripcion].join(' ')}
function classSearchText(cl){return [cl.dia,cl.hora,userName(cl.personalId),cl.estado,cl.observaciones,(cl.clientesIds||[]).map(clientName).join(' ')].join(' ')}
function scheduleSearchText(s){return [clientName(s.clienteId),userName(s.personalId),s.dia,s.horario,s.estado,s.claseId].join(' ')}
function paymentSearchText(p){return [clientName(p.clienteId),getPlan(p.planId)?.nombre,p.monto,p.fechaPago,p.mesAbonado,p.medioPago,p.estado,p.observaciones].join(' ')}
function moduleToolbar(module,extra='',placeholder){const key=moduleKey(module),value=getModuleSearch(module),ph=placeholder||moduleSearchPlaceholders[module]||'Buscar';return `<div class="module-toolbar"><div class="search-box"><span class="icon">⌕</span><input value="${escapeAttr(value)}" placeholder="${escapeAttr(ph)}" oninput="setModuleSearch('${key}',this.value)">${value?`<button type="button" class="btn btn-secondary clear-search" onclick="clearModuleSearch('${key}')" aria-label="Limpiar búsqueda">×</button>`:''}</div>${extra?`<div class="toolbar-actions">${extra}</div>`:''}</div>`}
function controls(module,extra=''){return moduleToolbar(module,extra)}

function getClassDurationMinutes(){return Number(db.settings.classDurationMinutes||60)}
function dateKey(date){const d=new Date(date);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function getStartOfWeek(date){const d=new Date(date);d.setHours(0,0,0,0);const day=d.getDay();const diff=(day===0?-6:1-day);d.setDate(d.getDate()+diff);return d}
function getWeekDays(date){const start=getStartOfWeek(date);return Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d})}
function formatAgendaDate(date){return new Intl.DateTimeFormat('es-AR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'}).format(date).replace(/^./,m=>m.toUpperCase())}
function changeAgendaWeek(direction){agendaState.currentDate=new Date(agendaState.currentDate.getFullYear(),agendaState.currentDate.getMonth(),agendaState.currentDate.getDate()+direction*7);agendaState.selectedMonth=agendaState.currentDate.getMonth();agendaState.selectedYear=agendaState.currentDate.getFullYear();render()}
function setAgendaMonth(month){agendaState.selectedMonth=Number(month);agendaState.currentDate=new Date(agendaState.selectedYear,agendaState.selectedMonth,1);render()}
function setAgendaYear(year){agendaState.selectedYear=Number(year);agendaState.currentDate=new Date(agendaState.selectedYear,agendaState.selectedMonth,1);render()}
function goToToday(){agendaState.currentDate=new Date();agendaState.selectedMonth=agendaState.currentDate.getMonth();agendaState.selectedYear=agendaState.currentDate.getFullYear();agendaExpandedDays[dateKey(agendaState.currentDate)]=true;render()}
function normalizeAgendaDayName(value){const n=normalizeSearch(value);if(n.startsWith('lun'))return 0;if(n.startsWith('mar'))return 1;if(n.startsWith('mie')||n.startsWith('mi'))return 2;if(n.startsWith('jue'))return 3;if(n.startsWith('vie'))return 4;if(n.startsWith('sab')||n.startsWith('sa'))return 5;if(n.startsWith('dom'))return 6;return -1}
function getClassDateForWeek(classItem, weekStart){const idx=normalizeAgendaDayName(classItem.dia);if(idx<0)return null;const d=new Date(weekStart);d.setDate(d.getDate()+idx);return d}
function sameCalendarDate(a,b){return dateKey(a)===dateKey(b)}
function parseClassDateTime(classItem,date){const [h,m]=String(classItem.hora||'00:00').split(':').map(Number);const d=new Date(date);d.setHours(h||0,m||0,0,0);return d}
function isClassInProgress(classItem,date){if(!sameCalendarDate(date,new Date()))return false;if(String(classItem.estado)!=='Activa')return false;const start=parseClassDateTime(classItem,date);const end=new Date(start.getTime()+getClassDurationMinutes()*60000);const nowDate=new Date();return nowDate>=start&&nowDate<end}
function getClassStatusForDate(classItem,date){if(classItem.estado==='Cancelada')return 'Cancelada';if(classItem.estado==='Finalizada')return 'Finalizada';if(isClassInProgress(classItem,date))return 'En curso';if((classItem.clientesIds||[]).length>=MAX_CUPO)return 'Completa';return classItem.estado||'Activa'}
function getClassesForSelectedWeek(){const start=getStartOfWeek(agendaState.currentDate);return visibleClasses().map(cl=>({...cl,agendaDate:getClassDateForWeek(cl,start)})).filter(cl=>cl.agendaDate)}
function classMatchesAgendaFilters(item){const f=filters||{};const status=getClassStatusForDate(item,item.agendaDate);if(f.agendaProf&&item.personalId!==f.agendaProf)return false;if(f.agendaEstado&&status!==f.agendaEstado&&item.estado!==f.agendaEstado)return false;if(f.agendaCliente&&!(item.clientesIds||[]).includes(f.agendaCliente))return false;if(f.agendaDay&&normalizeSearch(formatAgendaDate(item.agendaDate)).indexOf(normalizeSearch(f.agendaDay))===-1)return false;if(f.agendaAvailability==='available'&&(item.clientesIds||[]).length>=MAX_CUPO)return false;if(f.agendaAvailability==='full'&&(item.clientesIds||[]).length<MAX_CUPO)return false;if(f.agendaAvailability==='progress'&&!isClassInProgress(item,item.agendaDate))return false;const q=getModuleSearch('agenda');if(q&&!includesSearch(`${classSearchText(item)} ${formatAgendaDate(item.agendaDate)} ${status} ${(item.clientesIds||[]).length}/8`,q))return false;return true}
function getClassesGroupedByDate(){const grouped={};getWeekDays(agendaState.currentDate).forEach(d=>grouped[dateKey(d)]={date:d,classes:[]});getClassesForSelectedWeek().filter(classMatchesAgendaFilters).forEach(item=>{const key=dateKey(item.agendaDate);if(grouped[key])grouped[key].classes.push(item)});Object.values(grouped).forEach(g=>g.classes.sort((a,b)=>String(a.hora).localeCompare(String(b.hora))));return grouped}
function getAgendaSummaryByDay(group){const classes=group.classes;const students=classes.reduce((a,c)=>a+(c.clientesIds||[]).length,0);const free=classes.reduce((a,c)=>a+Math.max(0,MAX_CUPO-(c.clientesIds||[]).length),0);return `${classes.length} clases · ${students} alumnas · ${free} cupos disponibles`}
function getCurrentClassStatus(){return getClassesForSelectedWeek().filter(c=>isClassInProgress(c,c.agendaDate))}
function toggleAgendaDay(dateKeyValue){agendaExpandedDays[dateKeyValue]=!agendaExpandedDays[dateKeyValue];render()}
function renderAgendaControls(){const months=Array.from({length:12},(_,i)=>new Intl.DateTimeFormat('es-AR',{month:'long'}).format(new Date(2026,i,1)).replace(/^./,m=>m.toUpperCase()));const yearNow=new Date().getFullYear();const years=Array.from({length:9},(_,i)=>yearNow-4+i);return `<div class="agenda-controls"><button class="btn btn-secondary" onclick="changeAgendaWeek(-1)">← Semana anterior</button><select class="input" onchange="setAgendaMonth(this.value)">${months.map((m,i)=>`<option value="${i}" ${Number(agendaState.selectedMonth)===i?'selected':''}>${m}</option>`).join('')}</select><select class="input" onchange="setAgendaYear(this.value)">${years.map(y=>`<option value="${y}" ${Number(agendaState.selectedYear)===y?'selected':''}>${y}</option>`).join('')}</select><button class="btn btn-secondary" onclick="goToToday()">Hoy</button><button class="btn btn-secondary" onclick="changeAgendaWeek(1)">Semana siguiente →</button></div>`}
function renderAgendaFilters(){const prof=filters.agendaProf||'',estado=filters.agendaEstado||'',cliente=filters.agendaCliente||'',dia=filters.agendaDay||'',availability=filters.agendaAvailability||'';return `<div class="agenda-filters"><select class="input" onchange="filters.agendaProf=this.value;render()"><option value="">Profesor</option>${db.users.filter(u=>u.estado==='Activo').map(u=>`<option value="${u.id}" ${selected(prof,u.id)}>${u.nombre} ${u.apellido}</option>`).join('')}</select><select class="input" onchange="filters.agendaEstado=this.value;render()"><option value="">Estado</option>${['Activa','En curso','Completa','Cancelada','Finalizada'].map(s=>`<option ${selected(estado,s)}>${s}</option>`).join('')}</select><select class="input" onchange="filters.agendaCliente=this.value;render()"><option value="">Cliente</option>${visibleClients().map(c=>`<option value="${c.id}" ${selected(cliente,c.id)}>${c.nombre} ${c.apellido}</option>`).join('')}</select><select class="input" onchange="filters.agendaDay=this.value;render()"><option value="">Día</option>${days.map(d=>`<option ${selected(dia,d)}>${d}</option>`).join('')}</select><select class="input" onchange="filters.agendaAvailability=this.value;render()"><option value="">Cupo / estado rápido</option><option value="available" ${selected(availability,'available')}>Solo con cupo disponible</option><option value="full" ${selected(availability,'full')}>Solo completas</option><option value="progress" ${selected(availability,'progress')}>Solo en curso</option></select></div>`}
function renderAgendaClassCard(item,compact=false){const status=getClassStatusForDate(item,item.agendaDate);return `<div class="agenda-class-card" onclick="viewClass('${item.id}')"><div class="agenda-class-main"><div class="agenda-class-title">${item.hora} · ${userName(item.personalId)} · ${(item.clientesIds||[]).length}/${MAX_CUPO}</div><div class="flex flex-wrap gap-2">${statusBadge(status)}${cupoBadge(item)}</div></div>${compact?'':`<div class="agenda-class-meta">${(item.clientesIds||[]).map(clientName).join(', ')||'Sin alumnas'}</div>`}</div>`}
function renderAgendaDayBlock(group,compact=false){const key=dateKey(group.date);if(agendaExpandedDays[key]===undefined)agendaExpandedDays[key]=sameCalendarDate(group.date,new Date());const open=!!agendaExpandedDays[key];return `<section class="agenda-day-block"><button class="agenda-day-header" onclick="toggleAgendaDay('${key}')"><div><div class="agenda-day-title"><span class="agenda-arrow">${open?'⌄':'›'}</span><span>${formatAgendaDate(group.date)}</span></div><div class="agenda-day-summary">${getAgendaSummaryByDay(group)}</div></div>${group.classes.some(c=>isClassInProgress(c,c.agendaDate))?statusBadge('En curso'):''}</button>${open?`<div class="agenda-day-content">${group.classes.length?group.classes.map(c=>renderAgendaClassCard(c,compact)).join(''):noResults()}</div>`:''}</section>`}
function renderCollapsibleAgenda(compact=false){const grouped=getClassesGroupedByDate();const groups=Object.values(grouped);return `<div class="agenda-compact">${groups.map(g=>renderAgendaDayBlock(g,compact)).join('')}</div>`}
function renderAgenda(){return moduleToolbar('agenda',renderAgendaControls())+renderAgendaFilters()+renderCollapsibleAgenda(false)}
function agendaMini(){const current=getCurrentClassStatus();const todayUpcoming=getClassesForSelectedWeek().filter(c=>sameCalendarDate(c.agendaDate,new Date())&&parseClassDateTime(c,c.agendaDate)>=new Date()).sort((a,b)=>a.hora.localeCompare(b.hora)).slice(0,4);return `<div class="mt-4 agenda-compact">${current.length?`<div class="rounded-2xl border border-[#C8DDE2] bg-[#E7F0F2] p-3"><b>En curso</b><div class="mt-2 grid gap-2">${current.map(c=>renderAgendaClassCard(c,true)).join('')}</div></div>`:''}${todayUpcoming.length?`<div class="rounded-2xl border border-[#DED6C8] bg-[#F7F4EF] p-3"><b>Próximas de hoy</b><div class="mt-2 grid gap-2">${todayUpcoming.map(c=>renderAgendaClassCard(c,true)).join('')}</div></div>`:''}${renderCollapsibleAgenda(true)}</div>`}
function statusBadge(s){const map={Activo:'badge-ok',Activa:'badge-ok','En curso':'badge-blue',Completa:'badge-full',Completo:'badge-full',Disponible:'badge-ok',Pagado:'badge-ok',Pendiente:'badge-warn',Vencido:'badge-danger',Parcial:'badge-warn',Inactivo:'badge-muted',Cancelada:'badge-danger',Cancelado:'badge-danger',Finalizada:'badge-muted',Reprogramado:'badge-warn'};return `<span class="badge ${map[s]||'badge-muted'}">${s}</span>`}

function toggleActionsMenu(entityType,itemId){if(openActionsMenu.type===entityType&&openActionsMenu.id===itemId){closeActionsMenu();return}openActionsMenu={type:entityType,id:itemId};render()}
function closeActionsMenu(){if(openActionsMenu.type||openActionsMenu.id){openActionsMenu={type:null,id:null};render()}}
function menuAction(label,fn,danger=false){return `<button class="${danger?'danger':''}" onclick="event.stopPropagation();closeActionsMenu();${fn}">${label}</button>`}
function renderActionsMenu(entityType,item){const id=item?.id;if(!id)return '-';let items=[];if(entityType==='clients'){items.push(['Ver detalle',`viewClient('${id}')`]);if(canEdit('clients',item)){items.push(['Editar',`editClient('${id}')`],['Dar de baja',`lowClient('${id}')`],['Eliminar',`deleteClient('${id}')`,true])}}if(entityType==='users'){items.push(['Ver detalle',`viewUser('${id}')`]);if(canEdit('users',item))items.push(['Editar',`editUser('${id}')`],['Dar de baja',`lowUser('${id}')`]);if(canDelete('users',item))items.push(['Eliminar',`deleteUser('${id}')`,true])}if(entityType==='plans'){items.push(['Editar',`editPlan('${id}')`], [item.estado==='Activo'?'Desactivar':'Activar',`togglePlan('${id}')`]);if(canDelete('plans',item))items.push(['Eliminar',`deletePlan('${id}')`,true])}if(entityType==='classes'){items.push(['Ver alumnos',`viewClass('${id}')`]);if(canEdit('classes',item))items.push(['Editar',`editClass('${id}')`],['Cancelar',`cancelClass('${id}')`]);if(canDelete('classes',item))items.push(['Eliminar',`deleteClass('${id}')`,true])}if(entityType==='schedules'){if(canEdit('schedules',item))items.push(['Editar',`editSchedule('${id}')`],['Mover cliente',`moveSchedule('${id}')`],['Quitar cliente',`removeSchedule('${id}')`,true]);if(canDelete('schedules',item))items.push(['Eliminar',`deleteSchedule('${id}')`,true])}if(entityType==='payments'){items.push(['Ver detalle',`viewPayment('${id}')`]);if(canEdit('payments',item))items.push(['Editar',`editPayment('${id}')`]);if(canDelete('payments',item))items.push(['Eliminar',`deletePayment('${id}')`,true])}if(!items.length)return '-';const open=openActionsMenu.type===entityType&&openActionsMenu.id===id;return `<div class="action-cell" onclick="event.stopPropagation()"><button class="action-trigger" title="Acciones" aria-label="Acciones" onclick="event.stopPropagation();toggleActionsMenu('${entityType}','${id}')">⋮</button>${open?`<div class="action-menu">${items.map(([label,fn,danger])=>menuAction(label,fn,danger)).join('')}</div>`:''}</div>`}

function renderDashboard(){const activeClients=db.clients.filter(c=>c.estado==='Activo').length;const activeUsers=db.users.filter(u=>u.estado==='Activo').length;const todayName=new Date().toLocaleDateString('es-AR',{weekday:'long'}).replace(/^./,m=>m.toUpperCase());const visible=visibleClasses().filter(c=>c.estado==='Activa');const dayClasses=visible.filter(c=>normalizeAgendaDayName(c.dia)===normalizeAgendaDayName(todayName));const pending=db.payments.filter(p=>p.estado==='Pendiente').length;const overdue=db.payments.filter(p=>p.estado==='Vencido').length;const pendingAmount=db.payments.filter(p=>p.estado==='Pendiente').reduce((a,p)=>a+Number(p.monto),0);const overdueAmount=db.payments.filter(p=>p.estado==='Vencido').reduce((a,p)=>a+Number(p.monto),0);const monthIncome=db.payments.filter(p=>p.estado==='Pagado'&&p.mesAbonado===monthKey()).reduce((a,p)=>a+Number(p.monto),0);const totalSlots=visible.length*MAX_CUPO;const occupied=visible.reduce((a,c)=>a+(c.clientesIds||[]).length,0);const occupancyPct=totalSlots?Math.round((occupied/totalSlots)*100):0;const cuposAll=visible.reduce((a,c)=>a+(MAX_CUPO-(c.clientesIds||[]).length),0);return `${moduleToolbar('dashboard')}<div class="metric-grid dashboard-metrics">${stat('Clientes activos',activeClients,'Activos en el sistema','ok')}${stat('Personal activo',activeUsers,'Usuarios habilitados','ok')}${stat('Clases de hoy',dayClasses.length,'Agenda del día','ok')}${canViewPayments()?stat('Pagos pendientes',pending,money(pendingAmount),'warn'):''}${canViewPayments()?stat('Pagos vencidos',overdue,money(overdueAmount),'danger'):''}${canViewPayments()?stat('Ingresos del mes',money(monthIncome),'Pagos registrados','ok'):''}${stat('Horarios completos',occupancyPct+'%','de ocupación','gold')}${stat('Cupos disponibles',cuposAll,'sobre cupo máximo 8','ok')}</div><section class="card quickbar mt-4"><h3 class="panel-title">Accesos rápidos</h3><div class="quick-grid quick-actions">${isGeneral()?'<button onclick="newClient()" class="btn quick-action-btn">Nuevo cliente</button><button onclick="newPayment()" class="btn quick-action-btn">Nuevo pago</button><button onclick="newClass()" class="btn quick-action-btn">Nueva clase</button><button onclick="newUser()" class="btn quick-action-btn">Nuevo personal</button>':'<button onclick="go(\'clases\')" class="btn quick-action-btn">Mis clases</button>'}<button onclick="go('agenda')" class="btn quick-action-btn">Ver horarios</button>${canViewPayments()?'<button onclick="filters.estado=\'Pendiente\';go(\'pagos\')" class="btn quick-action-btn">Ver pagos pendientes</button>':''}</div></section><div class="dashboard-grid mt-4"><section class="card dash-panel"><div class="flex items-center justify-between gap-3"><h3 class="panel-title">Agenda semanal</h3><button onclick="go('agenda')" class="btn btn-soft !w-auto !py-2">Ver agenda completa</button></div>${agendaMini()}</section><section class="card dash-panel"><div class="flex items-center justify-between gap-3"><h3 class="panel-title">Pagos recientes</h3><button onclick="go('pagos')" class="btn btn-soft !w-auto !py-2">Ver todos</button></div>${paymentsMini()}</section></div><div class="dash-lower"><section class="card dash-panel"><h3 class="panel-title">Clases y ocupación</h3>${occupationMini()}</section><section class="card dash-panel"><h3 class="panel-title">Clientes destacados</h3>${clientsMini()}</section><section class="card dash-panel"><h3 class="panel-title">Permisos y roles</h3>${rolesMini()}</section></div>`}

  window.renderNav = function renderNav(){

    nav.innerHTML = allowedSections().map(([id,name,,icon]) => `<button class="tab ${currentSection===id?'active':''}" onclick="go('${id}')" title="${name}" aria-label="${name}"><span class="nav-icon">${icon || svg.dashboard}</span><span class="nav-label">${name}</span></button>`).join('');
  };
  window.collectPendingPayments = function collectPendingPayments(){
    const currentMonth = monthKey();
    const items = [];
    const seen = new Set();
    const explicit = (db.payments || []).filter(p => ['Pendiente','Vencido','Próximo a vencer','Proximo a vencer'].includes(p.estado));
    explicit.forEach(p => {
      const c = (db.clients || []).find(x => x.id === p.clienteId);
      const plan = getPlan(p.planId || (c && c.planId));
      if(!c || c.estado !== 'Activo') return;
      seen.add(c.id);
      items.push({client:c, plan, amount:Number(p.monto || (plan && plan.precio) || 0), status:p.estado, due:p.fechaVencimiento || p.vencimiento || p.fechaPago || '', source:p});
    });
    (db.clients || []).filter(c => c.estado === 'Activo').forEach(c => {
      if(seen.has(c.id)) return;
      const hasPaid = (db.payments || []).some(p => p.clienteId === c.id && p.estado === 'Pagado' && p.mesAbonado === currentMonth);
      if(hasPaid) return;
      const plan = getPlan(c.planId);
      items.push({client:c, plan, amount:Number((plan && plan.precio) || 0), status:'Pendiente', due:'Mes actual', source:null});
    });
    const weight = s => s === 'Vencido' ? 0 : String(s).includes('Próximo') || String(s).includes('Proximo') ? 2 : 1;
    return items.sort((a,b) => weight(a.status) - weight(b.status) || fullClientName(a.client).localeCompare(fullClientName(b.client))).slice(0,5);
  };

    return '<span class="badge badge-warn">Pendiente</span>';
  };
  window.paymentsMini = function paymentsMini(){

  }

    if(!canViewPayments()) return [];

    const items = [];

    (db.payments || [])
      .filter(p => ['Pendiente','Vencido','Próximo a vencer','Proximo a vencer'].includes(p.estado))
      .forEach(p => {
        const c = getClient(p.clienteId);
        if(!c || c.estado !== 'Activo') return;
        const plan = getPlan(p.planId || c.planId);
        usedClients.add(c.id);
        items.push({client:c, plan, amount:Number(p.monto || (plan && plan.precio) || 0), status:p.estado, due:p.fechaVencimiento || p.vencimiento || p.fechaPago || 'Sin fecha'});
      });
    (db.clients || []).filter(c => c.estado === 'Activo').forEach(c => {
      if(usedClients.has(c.id)) return;

    });

    const monthIncome=db.payments.filter(p=>p.estado==='Pagado'&&p.mesAbonado===monthKey()).reduce((a,p)=>a+Number(p.monto),0);

    return `<div class="metric-grid dashboard-metrics">${stat('Clientes activos',activeClients,'Activos en el sistema','ok')}${stat('Personal activo',activeUsers,'Usuarios habilitados','ok')}${stat('Clases de hoy',dayClasses.length,'Agenda del día','ok')}${canViewPayments()?stat('Pagos pendientes',pending,money(pendingAmount),'warn'):''}${canViewPayments()?stat('Pagos vencidos',overdue,money(overdueAmount),'danger'):''}${canViewPayments()?stat('Ingresos del mes',money(monthIncome),'Pagos registrados','ok'):''}${stat('Horarios completos',occupancyPct+'%','de ocupación','gold')}${stat('Cupos disponibles',cuposAll,'sobre cupo máximo 8','ok')}</div><section class="card quickbar mt-4"><h3 class="panel-title">Accesos rápidos</h3><div class="quick-grid quick-actions">${isGeneral()?'<button onclick="newClient()" class="btn quick-action-btn">Nuevo cliente</button><button onclick="newPayment()" class="btn quick-action-btn">Nuevo pago</button><button onclick="newClass()" class="btn quick-action-btn">Nueva clase</button><button onclick="newUser()" class="btn quick-action-btn">Nuevo personal</button>':'<button onclick="go(&quot;clases&quot;)" class="btn quick-action-btn">Mis clases</button>'}<button onclick="go('agenda')" class="btn quick-action-btn">Ver horarios</button>${canViewPayments()?'<button onclick="filters.estado=&quot;Pendiente&quot;;go(&quot;pagos&quot;)" class="btn quick-action-btn">Ver pagos pendientes</button>':''}</div></section><div class="dashboard-grid mt-4"><section class="card dash-panel"><div class="flex items-center justify-between gap-3"><h3 class="panel-title">Agenda semanal</h3><button onclick="go('agenda')" class="btn btn-soft !w-auto !py-2">Ver agenda completa</button></div>${agendaMini()}</section><section class="card dash-panel pending-panel"><div class="flex items-center justify-between gap-3"><h3 class="panel-title">Pagos pendientes</h3><button onclick="filters.estado='Pendiente';go('pagos')" class="btn btn-soft !w-auto !py-2">Ver todos</button></
